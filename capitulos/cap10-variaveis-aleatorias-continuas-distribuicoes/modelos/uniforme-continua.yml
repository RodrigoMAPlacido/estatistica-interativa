schema: EconSchema
aspectRatio: 1.55

params:
  - name: a
    value: 2
    min: 0
    max: 8
    round: 0.001

  - name: b
    value: 6
    min: 0
    max: 8
    round: 0.001

calcs:
  # =========================
  # Extremos ordenados
  # =========================
  left: "(params.a < params.b ? params.a : params.b)"
  right: "(params.a < params.b ? params.b : params.a)"
  largura: "(calcs.right - calcs.left)"

  # =========================
  # Medidas-resumo
  # =========================
  altura: "(1/calcs.largura)"
  media: "((calcs.left + calcs.right)/2)"
  variancia: "((calcs.largura^2)/12)"
  sigma: "((calcs.variancia)^0.5)"

  # =========================
  # Apoio visual
  # =========================
  yMaxView: "(calcs.altura + 0.42)"
  yArrow: "(calcs.altura + 0.18)"
  yMeanLabel: "(calcs.altura + 0.26)"
  yHeightLabel: "(calcs.altura + 0.06)"
  yAreaLabel: "(calcs.altura/2)"

colors:
  ink: "'#111827'"
  soft: "'#64748b'"
  grid: "'#d1d5db'"
  bg: "'#ffffff'"

layout:
  OneGraphPlusSidebar:
    graph:
      xAxis:
        min: 0
        max: 8
        ticks: 0

      yAxis:
        min: 0
        max: calcs.yMaxView
        ticks: 6
        title: Densidade

      objects:
        # =========================
        # Grade horizontal
        # =========================
        - Segment: { a: [0, 0.2], b: [8, 0.2], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 0.4], b: [8, 0.4], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 0.6], b: [8, 0.6], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 0.8], b: [8, 0.8], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 1.0], b: [8, 1.0], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }

        # =========================
        # Retângulo da densidade
        # =========================
        - Rectangle:
            x1: calcs.left
            x2: calcs.right
            y1: 0
            y2: calcs.altura
            fill: colors.ink
            opacity: 0.18

        - Segment:
            a: [calcs.left, calcs.altura]
            b: [calcs.right, calcs.altura]
            color: colors.ink
            strokeWidth: 2.2

        - Segment:
            a: [calcs.left, 0]
            b: [calcs.left, calcs.altura]
            color: colors.ink
            strokeWidth: 1.6

        - Segment:
            a: [calcs.right, 0]
            b: [calcs.right, calcs.altura]
            color: colors.ink
            strokeWidth: 1.6

        # =========================
        # Linha da média
        # =========================
        - Segment:
            a: [calcs.media, 0]
            b: [calcs.media, calcs.yMaxView]
            color: colors.ink
            strokeWidth: 1

        - Label:
            coordinates: [calcs.media, calcs.yMeanLabel]
            text: "`\\\\mathbf{E[X]} = ${calcs.media.toFixed(2)}`"
            bgcolor: colors.bg
            color: colors.ink
            fontSize: 10
            position: b

        # =========================
        # Segmento de 1 desvio padrão
        # =========================
        - Arrow:
            begin: [calcs.media, calcs.yArrow]
            end: [calcs.media + calcs.sigma, calcs.yArrow]
            color: colors.soft
            strokeWidth: 2
            label:
              text: "`+ ${calcs.sigma.toFixed(2)}`"
              position: t
              fontSize: 9

        - Arrow:
            begin: [calcs.media, calcs.yArrow]
            end: [calcs.media - calcs.sigma, calcs.yArrow]
            color: colors.soft
            strokeWidth: 2
            label:
              text: "`- ${calcs.sigma.toFixed(2)}`"
              position: t
              fontSize: 9

        # =========================
        # Labels do intervalo
        # =========================
        - Label:
            coordinates: [calcs.left, 0]
            text: "`a=${calcs.left.toFixed(2)}`"
            bgcolor: colors.bg
            color: colors.ink
            fontSize: 9
            position: t

        - Label:
            coordinates: [calcs.right, 0]
            text: "`b=${calcs.right.toFixed(2)}`"
            bgcolor: colors.bg
            color: colors.ink
            fontSize: 9
            position: t

        # =========================
        # Label da densidade
        # =========================
        - Label:
            coordinates: [calcs.left + 0.18*calcs.largura, calcs.yHeightLabel]
            text: "`f(x)=\\\\frac{1}{b-a}=${calcs.altura.toFixed(3)}`"
            bgcolor: colors.bg
            color: colors.ink
            fontSize: 8



    sidebar:
      triggerWidth: 9999
      controls:
        - title:
          sliders:
            - param: a
              label: "a"
            - param: b
              label: "b"

          divs:
            # ---------------------------
            # 1) DADOS
            # ---------------------------
            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Dados:</b></div>"

            - html: "`$$\\\\small
                      X\\\\sim U(a,b)
                      $$`"

            - html: "`$$\\\\small
                      a=${calcs.left.toFixed(2)},\\\\qquad
                      b=${calcs.right.toFixed(2)}
                      $$`"

            - html: "`$$\\\\small
                      b-a=${calcs.largura.toFixed(2)}
                      $$`"

            # ---------------------------
            # 2) FUNÇÃO DENSIDADE
            # ---------------------------
            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Função densidade:</b></div>"

            - html: "`$$\\\\small
                      f(x)=\\\\frac{1}{b-a},\\\\qquad a\\\\le x\\\\le b
                      $$`"

            - html: "`$$\\\\small
                      f(x)=\\\\frac{1}{${calcs.largura.toFixed(2)}}=${calcs.altura.toFixed(3)}
                      $$`"

            # ---------------------------
            # 3) MÉDIA
            # ---------------------------
            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Média:</b></div>"

            - html: "`$$\\\\small
                      E[X]=\\\\frac{a+b}{2}
                      $$`"

            - html: "`$$\\\\small
                      E[X]=\\\\frac{${calcs.left.toFixed(2)}+${calcs.right.toFixed(2)}}{2}=${calcs.media.toFixed(2)}
                      $$`"

            # ---------------------------
            # 4) VARIÂNCIA
            # ---------------------------
            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Variância:</b></div>"

            - html: "`$$\\\\small
                      Var(X)=\\\\frac{(b-a)^2}{12}
                      $$`"

            - html: "`$$\\\\small
                      Var(X)=\\\\frac{(${calcs.largura.toFixed(2)})^2}{12}=${calcs.variancia.toFixed(3)}
                      $$`"

            # ---------------------------
            # 5) DESVIO PADRÃO
            # ---------------------------
            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Desvio padrão:</b></div>"

            - html: "`$$\\\\small
                      \\\\sigma=\\\\frac{b-a}{\\\\sqrt{12}}
                      $$`"

            - html: "`$$\\\\small
                      \\\\sigma=\\\\frac{${calcs.largura.toFixed(2)}}{\\\\sqrt{12}}=${calcs.sigma.toFixed(2)}
                      $$`"

