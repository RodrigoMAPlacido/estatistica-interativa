schema: EconSchema
aspectRatio: 1.55

params:
  - name: lambda
    value: 4
    min: 0.2
    max: 10
    round: 0.001

calcs:
  # =========================
  # Medidas-resumo
  # =========================
  media: "(params.lambda)"
  variancia: "(params.lambda)"
  sigma: "((params.lambda)^0.5)"

  # =========================
  # Fator comum
  # =========================
  base: "(exp(-params.lambda))"

  # =========================
  # Probabilidades de Poisson
  # Suporte exibido: x = 0,...,20
  # =========================
  px0:  "(calcs.base)"
  px1:  "(calcs.base * params.lambda)"
  px2:  "(calcs.base * (params.lambda^2) / 2)"
  px3:  "(calcs.base * (params.lambda^3) / 6)"
  px4:  "(calcs.base * (params.lambda^4) / 24)"
  px5:  "(calcs.base * (params.lambda^5) / 120)"
  px6:  "(calcs.base * (params.lambda^6) / 720)"
  px7:  "(calcs.base * (params.lambda^7) / 5040)"
  px8:  "(calcs.base * (params.lambda^8) / 40320)"
  px9:  "(calcs.base * (params.lambda^9) / 362880)"
  px10: "(calcs.base * (params.lambda^10) / 3628800)"
  px11: "(calcs.base * (params.lambda^11) / 39916800)"
  px12: "(calcs.base * (params.lambda^12) / 479001600)"
  px13: "(calcs.base * (params.lambda^13) / 6227020800)"
  px14: "(calcs.base * (params.lambda^14) / 87178291200)"
  px15: "(calcs.base * (params.lambda^15) / 1307674368000)"
  px16: "(calcs.base * (params.lambda^16) / 20922789888000)"
  px17: "(calcs.base * (params.lambda^17) / 355687428096000)"
  px18: "(calcs.base * (params.lambda^18) / 6402373705728000)"
  px19: "(calcs.base * (params.lambda^19) / 121645100408832000)"
  px20: "(calcs.base * (params.lambda^20) / 2432902008176640000)"

  somaProb: "(calcs.px0 + calcs.px1 + calcs.px2 + calcs.px3 + calcs.px4 + calcs.px5 + calcs.px6 + calcs.px7 + calcs.px8 + calcs.px9 + calcs.px10 + calcs.px11 + calcs.px12 + calcs.px13 + calcs.px14 + calcs.px15 + calcs.px16 + calcs.px17 + calcs.px18 + calcs.px19 + calcs.px20)"

colors:
  ink: "'#111827'"
  soft: "'#64748b'"
  grid: "'#d1d5db'"
  bg: "'#ffffff'"

layout:
  OneGraphPlusSidebar:
    graph:
      xAxis:
        min: 0
        max: 14
        ticks: 0
      yAxis:
        min: 0
        max: 0.25
        ticks: 6
        title: Probabilidades

      objects:
        # =========================
        # Grade horizontal
        # =========================
        - Segment: { a: [0, 0.2], b: [21, 0.2], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 0.4], b: [21, 0.4], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 0.6], b: [21, 0.6], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 0.8], b: [21, 0.8], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }
        - Segment: { a: [0, 1.0], b: [21, 1.0], color: colors.grid, strokeWidth: 0.5, lineStyle: dashed }

        # =========================
        # Barras da distribuição (largura = 0.80)
        # =========================
        - Rectangle: { x1: -0.40, x2: 0.40,  y1: 0, y2: calcs.px0,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 0.60,  x2: 1.40,  y1: 0, y2: calcs.px1,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 1.60,  x2: 2.40,  y1: 0, y2: calcs.px2,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 2.60,  x2: 3.40,  y1: 0, y2: calcs.px3,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 3.60,  x2: 4.40,  y1: 0, y2: calcs.px4,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 4.60,  x2: 5.40,  y1: 0, y2: calcs.px5,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 5.60,  x2: 6.40,  y1: 0, y2: calcs.px6,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 6.60,  x2: 7.40,  y1: 0, y2: calcs.px7,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 7.60,  x2: 8.40,  y1: 0, y2: calcs.px8,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 8.60,  x2: 9.40,  y1: 0, y2: calcs.px9,  fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 9.60,  x2: 10.40, y1: 0, y2: calcs.px10, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 10.60, x2: 11.40, y1: 0, y2: calcs.px11, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 11.60, x2: 12.40, y1: 0, y2: calcs.px12, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 12.60, x2: 13.40, y1: 0, y2: calcs.px13, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 13.60, x2: 14.40, y1: 0, y2: calcs.px14, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 14.60, x2: 15.40, y1: 0, y2: calcs.px15, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 15.60, x2: 16.40, y1: 0, y2: calcs.px16, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 16.60, x2: 17.40, y1: 0, y2: calcs.px17, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 17.60, x2: 18.40, y1: 0, y2: calcs.px18, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 18.60, x2: 19.40, y1: 0, y2: calcs.px19, fill: colors.ink, opacity: 1 }
        - Rectangle: { x1: 19.60, x2: 20.40, y1: 0, y2: calcs.px20, fill: colors.ink, opacity: 1 }

        # =========================
        # Linha da média
        # =========================
        - Segment:
            a: [calcs.media, 0]
            b: [calcs.media, 1.0]
            color: colors.ink
            strokeWidth: 1

        - Label:
            coordinates: [calcs.media, 0.25]
            text: "`\\\\mathbf{E[X]} = ${calcs.media.toFixed(2)}`"
            bgcolor: colors.bg
            color: colors.ink
            fontSize: 11
            position: b

        # =========================
        # Segmento de 1 desvio padrão
        # =========================
        - Arrow:
            begin: [calcs.media, 0.24]
            end: [calcs.media + calcs.sigma, 0.24]
            color: colors.soft
            strokeWidth: 1.5
            label:
              text: "`+ ${calcs.sigma.toFixed(2)}`"
              position: t
              fontSize: 9

        - Arrow:
            begin: [calcs.media, 0.24]
            end: [calcs.media - calcs.sigma, 0.24]
            color: colors.soft
            strokeWidth: 1.5
            label:
              text: "`- ${calcs.sigma.toFixed(2)}`"
              position: t
              fontSize: 9

        # =========================
        # Labels do eixo x
        # =========================
        - Label: { coordinates: [0, 0],  text: "'0'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [1, 0],  text: "'1'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [2, 0],  text: "'2'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [3, 0],  text: "'3'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [4, 0],  text: "'4'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [5, 0],  text: "'5'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [6, 0],  text: "'6'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [7, 0],  text: "'7'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [8, 0],  text: "'8'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [9, 0],  text: "'9'",  bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [10, 0], text: "'10'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [11, 0], text: "'11'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [12, 0], text: "'12'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [13, 0], text: "'13'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [14, 0], text: "'14'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [15, 0], text: "'15'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [16, 0], text: "'16'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [17, 0], text: "'17'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [18, 0], text: "'18'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [19, 0], text: "'19'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }
        - Label: { coordinates: [20, 0], text: "'20'", bgcolor: colors.bg, color: colors.ink, fontSize: 8, position: t }

        # =========================
        # Labels sobre as barras
        # =========================
        - Label: { coordinates: [0,  calcs.px0  + 0.008], text: "`${calcs.px0.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [1,  calcs.px1  + 0.008], text: "`${calcs.px1.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [2,  calcs.px2  + 0.008], text: "`${calcs.px2.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [3,  calcs.px3  + 0.008], text: "`${calcs.px3.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [4,  calcs.px4  + 0.008], text: "`${calcs.px4.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [5,  calcs.px5  + 0.008], text: "`${calcs.px5.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [6,  calcs.px6  + 0.008], text: "`${calcs.px6.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [7,  calcs.px7  + 0.008], text: "`${calcs.px7.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [8,  calcs.px8  + 0.008], text: "`${calcs.px8.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [9,  calcs.px9  + 0.008], text: "`${calcs.px9.toFixed(3)}`",  bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [10, calcs.px10 + 0.008], text: "`${calcs.px10.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [11, calcs.px11 + 0.008], text: "`${calcs.px11.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [12, calcs.px12 + 0.008], text: "`${calcs.px12.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [13, calcs.px13 + 0.008], text: "`${calcs.px13.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [14, calcs.px14 + 0.008], text: "`${calcs.px14.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [15, calcs.px15 + 0.008], text: "`${calcs.px15.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [16, calcs.px16 + 0.008], text: "`${calcs.px16.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [17, calcs.px17 + 0.008], text: "`${calcs.px17.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [18, calcs.px18 + 0.008], text: "`${calcs.px18.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [19, calcs.px19 + 0.008], text: "`${calcs.px19.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }
        - Label: { coordinates: [20, calcs.px20 + 0.008], text: "`${calcs.px20.toFixed(3)}`", bgcolor: colors.bg, color: colors.ink, fontSize: 8 }

    sidebar:
      triggerWidth: 9999
      controls:
        - title: 
          sliders:
            - param: lambda
              label: "λ"

          divs:
            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Dados:</b></div>"
            - html: "$$\\small X\\sim Poisson(\\lambda)$$"
            - html: "`$$\\\\small \\\\lambda=${params.lambda.toFixed(3)}$$`"

            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Probabilidade:</b></div>"
            - html: "$$\\small P(X=x)=e^{-\\lambda}\\frac{\\lambda^x}{x!}$$"
            - html: "$$\\small x=0,1,2,\\dots$$"

            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Média:</b></div>"
            - html: "$$\\small E[X]=\\lambda$$"
            - html: "`$$\\\\small E[X]=${calcs.media.toFixed(2)}$$`"

            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Desvio padrão:</b></div>"
            - html: "$$\\small \\sigma=\\sqrt{\\lambda}$$"
            - html: "`$$\\\\small \\\\sigma=${calcs.sigma.toFixed(2)}$$`"

            - html: "<div style='text-align:left; font-size:18px; margin:14px 0 10px 0;'><b>Checagem:</b></div>"
            - html: "`$$\\\\small \\\\sum_{x=0}^{20} P(X=x) \\\\approx ${calcs.somaProb.toFixed(3)}$$`"