schema: EconSchema
aspectRatio: 1.55

params:
  - name: N
    value: 20
    min: 15
    max: 25
    round: 1

  - name: K
    value: 10
    min: 5
    max: 15
    round: 1

  - name: n
    value: 10
    min: 1
    max: 20
    round: 1

calcs:
  # =========================
  # Coerção numérica
  # =========================
  NN: "(1*params.N)"
  KK: "(1*params.K)"
  nn: "(1*params.n)"
  MM: "(calcs.NN - calcs.KK)"

  # =========================
  # Validade sem operadores lógicos compostos
  # =========================
  okN: "(calcs.NN >= 1 ? 1 : 0)"
  okK: "(calcs.KK <= calcs.NN ? 1 : 0)"
  okn: "(calcs.nn <= calcs.NN ? 1 : 0)"
  ok20: "(calcs.nn <= 20 ? 1 : 0)"
  valido: "(calcs.okN * calcs.okK * calcs.okn * calcs.ok20)"

  # =========================
  # Suporte
  # xmin = max(0, n-(N-K))
  # xmax = min(n,K)
  # =========================
  tmin: "(calcs.nn - calcs.MM)"
  xmin: "(calcs.tmin > 0 ? calcs.tmin : 0)"
  xmax: "(calcs.nn < calcs.KK ? calcs.nn : calcs.KK)"


  media: "((calcs.nn * calcs.KK) / calcs.NN)"
  variancia: "(calcs.nn * (calcs.KK / calcs.NN) * (1 - calcs.KK / calcs.NN) * ((calcs.NN - calcs.nn) / (calcs.NN - 1)))"
  sigma: "((calcs.variancia) ^ 0.5)"


  # =========================
  # Indicadores de n = 0,...,20
  # =========================
  n0:  "(calcs.nn < 0.5 ? 1 : 0)"
  n1:  "(calcs.nn >= 0.5 ? (calcs.nn < 1.5 ? 1 : 0) : 0)"
  n2:  "(calcs.nn >= 1.5 ? (calcs.nn < 2.5 ? 1 : 0) : 0)"
  n3:  "(calcs.nn >= 2.5 ? (calcs.nn < 3.5 ? 1 : 0) : 0)"
  n4:  "(calcs.nn >= 3.5 ? (calcs.nn < 4.5 ? 1 : 0) : 0)"
