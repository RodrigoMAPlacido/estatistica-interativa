            bgcolor: colors.bg
            color: colors.ink
            fontSize: 9
            position: b

        # =========================
        # Segmentos de 1 desvio padrão
        # =========================
        - Arrow:
            begin: [calcs.media, 0.39]
            end: [calcs.media + calcs.sigma, 0.39]
            color: colors.soft
            strokeWidth: 1.5
            label:
