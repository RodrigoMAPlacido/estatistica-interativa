    sidebar:
      triggerWidth: 9999
      controls:
        - title:
          sliders:
            - param: N
              label: "N"
            - param: K
              label: "K"
            - param: n
              label: "n"

          divs:
            # ---------------------------
            # 1) DADOS
            # ---------------------------
            - html: "<div style='text-align:left; font-size:11px; margin:14px 0 10px 0;'><b>Dados:</b></div>"

            - html: "`$$\\\\tiny
                      X\\\\sim H(N,K,n)
                      $$`"

            - html: "`$$\\\\tiny
                      N=${params.N.toFixed(0)},\\\\qquad
                      K=${params.K.toFixed(0)},\\\\qquad
                      n=${params.n.toFixed(0)}
                      $$`"

            # ---------------------------
            # 2) FUNÇÃO DE PROBABILIDADE
            # ---------------------------
            - html: "<div style='text-align:left; font-size:11px; margin:14px 0 10px 0;'><b>Função de probabilidade:</b></div>"

            - html: "`$$\\\\tiny
                      P(X=x)=\\\\frac{\\\\binom{K}{x}\\\\binom{N-K}{n-x}}{\\\\binom{N}{n}}
                      $$`"

            - html: "`$$\\\\tiny
                      x=${calcs.xmin.toFixed(0)},${(calcs.xmin+1).toFixed(0)},\\\\dots,${calcs.xmax.toFixed(0)}
                      $$`"

            # ---------------------------
            # 3) MÉDIA
            # ---------------------------
            - html: "<div style='text-align:left; font-size:11px; margin:14px 0 10px 0;'><b>Média:</b></div>"

            - html: "`$$\\\\tiny
                      E[X]=n\\\\frac{K}{N}
                      $$`"

            - html: "`$$\\\\tiny
                      E[X]=${params.n.toFixed(0)}\\\\cdot\\\\frac{${params.K.toFixed(0)}}{${params.N.toFixed(0)}}=${calcs.media.toFixed(2)}
                      $$`"

            # ---------------------------
            # 4) VARIÂNCIA
            # ---------------------------
            - html: "<div style='text-align:left; font-size:11px; margin:14px 0 10px 0;'><b>Variância:</b></div>"

            - html: "`$$\\\\tiny
                      Var(X)=n\\\\frac{K}{N}\\\\left(1-\\\\frac{K}{N}\\\\right)\\\\frac{N-n}{N-1}
                      $$`"

            - html: "`$$\\\\tiny
                      Var(X)=${calcs.variancia.toFixed(3)}
                      $$`"

            # ---------------------------
            # 5) DESVIO PADRÃO
            # ---------------------------
            - html: "<div style='text-align:left; font-size:11px; margin:14px 0 10px 0;'><b>Desvio padrão:</b></div>"

            - html: "`$$\\\\tiny
                      \\\\sigma=\\\\sqrt{n\\\\frac{K}{N}\\\\left(1-\\\\frac{K}{N}\\\\right)\\\\frac{N-n}{N-1}}
                      $$`"

            - html: "`$$\\\\tiny
                      \\\\sigma=${calcs.sigma.toFixed(2)}
                      $$`"

            # ---------------------------
            # 6) CHECAGEM
            # ---------------------------
            - html: "<div style='text-align:left; font-size:11px; margin:14px 0 10px 0;'><b>Checagem:</b></div>"

            - html: "`$$\\\\tiny
                      \\\\sum_{x=0}^{20}P(X=x)\\\\approx ${calcs.somaProb.toFixed(3)}
                      $$`"