<svg viewBox="0 0 1000 780"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc"
     preserveAspectRatio="xMidYMid meet">

  <title id="title">Função de distribuição acumulada</title>
  <desc id="desc">
    A animação mostra, acima, a densidade contínua com a área acumulada até um ponto x.
    Abaixo, mostra a função de distribuição acumulada F(x), correspondente a essa acumulação.
  </desc>

  <defs>
    <style>
      :root{
        --ink:#111827;
        --ink-soft:#64748b;
        --grid:#d1d5db;
        --shade:#11182710;
        --shade-strong:#11182722;
        --font:"et-book","ETBook","Georgia","Times New Roman",serif;
        --cycle:9.2s;
        --ease:ease-in-out;
      }

      svg{
        background:#ffffff;
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
      }

      .u-stroke{
        stroke:var(--ink);
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:non-scaling-stroke;
      }

      .u-panel{
        stroke-width:2;
        rx:22;
        ry:22;
      }

      .title{
        font-size:34px;
        font-weight:600;
        text-anchor:middle;
      }

      .small{
        font-size:21px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .formula{
        font-size:24px;
        text-anchor:middle;
        opacity:0;
        animation:showFormula var(--cycle) var(--ease) infinite;
      }

      .axis{
        stroke-width:2;
      }

      .grid line{
        stroke:var(--grid);
        stroke-width:1;
        vector-effect:non-scaling-stroke;
      }

      .ylab{
        font-size:22px;
        fill:var(--ink-soft);
        text-anchor:middle;
      }

      .ticklab{
        font-size:19px;
        fill:var(--ink-soft);
        text-anchor:middle;
      }

      .zeroTick{
        font-size:18px;
        fill:var(--ink-soft);
        text-anchor:end;
      }

      .baseArea{
        fill:var(--shade);
        opacity:0;
        animation:showBaseArea var(--cycle) var(--ease) infinite;
      }

      .accArea{
        fill:var(--shade-strong);
        opacity:0;
        animation:showAccArea var(--cycle) var(--ease) infinite;
      }

      .curve{
        stroke:var(--ink);
        stroke-width:2.5;
        fill:none;
        vector-effect:non-scaling-stroke;
        stroke-dasharray:760;
        stroke-dashoffset:760;
        animation:drawCurve var(--cycle) var(--ease) infinite;
      }

      .markerLine{
        stroke:var(--ink);
        stroke-width:1.8;
        stroke-dasharray:6 6;
        vector-effect:non-scaling-stroke;
        opacity:0;
        animation:showMarker var(--cycle) var(--ease) infinite;
      }

      .markerPoint{
        fill:var(--ink);
        opacity:0;
        animation:showMarker var(--cycle) var(--ease) infinite;
      }

      .markerLabel{
        font-size:20px;
        text-anchor:middle;
        opacity:0;
        animation:showMarker var(--cycle) var(--ease) infinite;
      }

      .curveLabel{
        font-size:20px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:showCurveLabel var(--cycle) var(--ease) infinite;
      }

      @keyframes drawCurve{
        0%,10%{
          stroke-dashoffset:760;
          opacity:0;
        }
        22%,88%{
          stroke-dashoffset:0;
          opacity:1;
        }
        100%{
          stroke-dashoffset:760;
          opacity:0;
        }
      }

      @keyframes showBaseArea{
        0%,14%{
          opacity:0;
        }
        26%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showAccArea{
        0%,34%{
          opacity:0;
        }
        46%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showMarker{
        0%,34%{
          opacity:0;
        }
        46%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showFormula{
        0%,46%{
          opacity:0;
        }
        58%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showCurveLabel{
        0%,22%{
          opacity:0;
        }
        34%,48%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @media (prefers-reduced-motion:reduce){
        .baseArea,.accArea,.curve,.markerLine,.markerPoint,.markerLabel,.formula,.curveLabel{
          animation:none;
          opacity:1;
          stroke-dashoffset:0;
        }
      }
    </style>

    <!-- área acumulada no gráfico de cima -->
<clipPath id="accClipTop">
  <rect x="30" y="0" width="0" height="200">
    <animate attributeName="width"
             dur="9.2s"
             repeatCount="indefinite"
             keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
             values="0;0;20;40;60;80;100;120;140;160;180;200;220;240;240"/>
  </rect>
</clipPath>
  </defs>

  <g transform="translate(40,40)">
    <rect x="0" y="0" width="860" height="700" class="u-panel u-stroke"/>

    <text x="430" y="34" class="title">Função de distribuição acumulada</text>
    <text x="430" y="64" class="small">a área sob f(x) até x corresponde ao valor acumulado F(x)</text>
    <text x="430" y="106" class="formula">
      F(x) = ∫<tspan baseline-shift="sub" font-size="16">−∞</tspan><tspan baseline-shift="super" font-size="16">x</tspan> f(t) dt
    </text>

    <!-- ===================================================== -->
    <!-- DENSIDADE -->
    <!-- ===================================================== -->
    <g transform="translate(120,145)">
      <text x="300" y="0" class="curveLabel">densidade f(x)</text>

      <g class="grid">
        <line x1="0" y1="150" x2="600" y2="150"/>
        <line x1="0" y1="110" x2="600" y2="110"/>
        <line x1="0" y1="70"  x2="600" y2="70"/>
        <line x1="0" y1="30"  x2="600" y2="30"/>
      </g>

      <g class="u-stroke axis">
        <line x1="0" y1="190" x2="600" y2="190"/>
        <line x1="0" y1="190" x2="0" y2="30"/>
      </g>

      <text x="-58" y="150" class="ylab" transform="rotate(-90 -58 110)">f(x)</text>
      <text x="-18" y="194" class="zeroTick">0</text>

      <!-- área total suave -->
      <g transform="matrix(2.166667 0 0 1.5 -25 10)">
        <path d="M30,120
                 C95,120 125,20 150,20
                 C175,20 205,120 270,120
                 L270,120
                 L30,120 Z"
              class="baseArea"/>
      </g>

      <!-- área acumulada -->
      <g clip-path="url(#accClipTop)" transform="matrix(2.166667 0 0 1.5 -25 10)">
        <path d="M30,120
                 C95,120 125,20 150,20
                 C175,20 205,120 270,120
                 L270,120
                 L30,120 Z"
              class="accArea"/>
      </g>

      <!-- curva -->
      <g transform="matrix(2.166667 0 0 1.5 -25 10)">
        <path d="M30,120
                 C95,120 125,20 150,20
                 C175,20 205,120 270,120"
              class="curve"/>
      </g>

      <!-- linha vertical móvel -->
      <line y1="30" y2="190" class="markerLine">
        <animate attributeName="x1"
                 dur="9.2s"
                 repeatCount="indefinite"
                 keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
                 values="40;40;83.333;126.667;170;213.333;256.667;300;343.333;386.667;430;473.333;516.667;560;560"/>
        <animate attributeName="x2"
                 dur="9.2s"
                 repeatCount="indefinite"
                 keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
                 values="40;40;83.333;126.667;170;213.333;256.667;300;343.333;386.667;430;473.333;516.667;560;560"/>
      </line>

      <text y="220" class="markerLabel">
        x
        <animate attributeName="x"
                 dur="9.2s"
                 repeatCount="indefinite"
                 keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
                 values="40;40;83.333;126.667;170;213.333;256.667;300;343.333;386.667;430;473.333;516.667;560;560"/>
      </text>
    </g>

    <!-- ===================================================== -->
    <!-- FDA -->
    <!-- ===================================================== -->
    <g transform="translate(120,410)">
      <text x="300" y="-10" class="curveLabel">distribuição acumulada F(x)</text>

      <g class="grid">
        <line x1="0" y1="150" x2="600" y2="150"/>
        <line x1="0" y1="110" x2="600" y2="110"/>
        <line x1="0" y1="70"  x2="600" y2="70"/>
        <line x1="0" y1="30"  x2="600" y2="30"/>
      </g>

      <g class="u-stroke axis">
        <line x1="0" y1="190" x2="600" y2="190"/>
        <line x1="0" y1="190" x2="0" y2="0"/>
      </g>

      <text x="-58" y="150" class="ylab" transform="rotate(-90 -58 110)">F(x)</text>
      <text x="-18" y="194" class="zeroTick">0</text>

      <!-- curva acumulada -->
      <path id="cdfPath"
            d="M40,190
               C120,190 170,184 215,160
               C255,138 280,118 300,102
               C320,86 345,62 385,40
               C430,18 480,10 560,10"
            class="curve"/>

      <!-- linha vertical móvel -->
      <line y1="30" y2="190" class="markerLine">
        <animate attributeName="x1"
                 dur="9.2s"
                 repeatCount="indefinite"
                 keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
                 values="40;40;83.333;126.667;170;213.333;256.667;300;343.333;386.667;430;473.333;516.667;560;560"/>
        <animate attributeName="x2"
                 dur="9.2s"
                 repeatCount="indefinite"
                 keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
                 values="40;40;83.333;126.667;170;213.333;256.667;300;343.333;386.667;430;473.333;516.667;560;560"/>
      </line>

      <!-- ponto sincronizado com a linha -->
      <circle r="4.5" class="markerPoint">
        <animate attributeName="cx"
                 dur="9.2s"
                 repeatCount="indefinite"
                 keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
                 values="40;40;83.333;126.667;170;213.333;256.667;300;343.333;386.667;430;473.333;516.667;560;560"/>
        <animate attributeName="cy"
                 dur="9.2s"
                 repeatCount="indefinite"
                 keyTimes="0;0.34;0.38;0.43;0.48;0.53;0.58;0.63;0.68;0.73;0.78;0.83;0.88;0.92;1"
                 values="190;190;188.9;185.9;178.0;161.4;134.5;100;65.5;38.6;22.0;14.1;11.1;10.2;10.2"/>
      </circle>

      <!-- eixo x -->
      <text x="40"  y="220" class="ticklab">−3</text>
      <text x="126.667" y="220" class="ticklab">−2</text>
      <text x="213.333" y="220" class="ticklab">−1</text>
      <text x="300" y="220" class="ticklab">0</text>
      <text x="386.667" y="220" class="ticklab">1</text>
      <text x="473.333" y="220" class="ticklab">2</text>
      <text x="560" y="220" class="ticklab">3</text>

      <text x="300" y="265" class="small">valores possíveis de X</text>
    </g>
  </g>
</svg>