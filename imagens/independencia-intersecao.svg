<?xml version="1.0" encoding="UTF-8"?>
<!-- =========================================================
   INDEPENDÊNCIA E INTERSEÇÃO — padrão EI
   Ideia:
   1) surgem P(A) e P(B)
   2) setas convergem para o centro
   3) surge P(A ∩ B)
   4) aparece a equivalência: P(A ∩ B) = P(A) · P(B)
   ========================================================= -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 920 360"
     width="920" height="360"
     role="img"
     aria-labelledby="title desc"
     style="background:#ffffff">

  <title id="title">Independência e interseção</title>
  <desc id="desc">
    A animação mostra dois blocos laterais rotulados P(A) e P(B), cujas setas convergem
    para um bloco central P(A ∩ B). Em seguida, aparece a igualdade
    P(A ∩ B) = P(A) · P(B), representando a caracterização da independência.
  </desc>

  <defs>
    <style>
      :root{
        --ink:#111827;
        --muted:#64748b;
        --soft:rgba(17,24,39,0.08);
        --soft-mid:rgba(17,24,39,0.12);
        --soft-strong:rgba(17,24,39,0.18);

        --font:"et-book","ETBook","Georgia",serif;

        --cycle:11.5s;
        --ease:ease-in-out;

        --dash:2000;
        --dashTitle:1400;
        --dashText:900;
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
        letter-spacing:.12px;
      }

      .u-center{ text-anchor:middle; dominant-baseline:middle; }
      .u-bold{ font-weight:700; }
      .u-stroke{
        fill:none;
        stroke:var(--ink);
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:non-scaling-stroke;
      }
      .u-box{
        fill:#ffffff;
        stroke:var(--ink);
        stroke-width:1.5;
        rx:18;
        ry:18;
        vector-effect:non-scaling-stroke;
      }
      .u-head{ fill:var(--ink); }

      .fill-soft{ fill:var(--soft); }
      .fill-mid{ fill:var(--soft-mid); }
      .fill-strong{ fill:var(--soft-strong); }

      /* =========================================
         TÍTULO / RODAPÉ — mesmo padrão dos teus SVGs
         ========================================= */
      @keyframes k-titleFill{
        0%,5.5% { opacity:0; }
        6%      { opacity:.15; }
        9.5%    { opacity:.70; }
        11.2%   { opacity:.92; }
        11.3%   { opacity:1; }
        85.99%  { opacity:1; }
        95%     { opacity:.45; }
        100%    { opacity:0; }
      }
      .a-titleFill{
        opacity:0;
        animation:k-titleFill var(--cycle) linear infinite both;
      }

      @keyframes k-titleStrokeDrawPauseRetract{
        0%     { stroke-dashoffset:var(--dashTitle); opacity:1; }
        10%    { stroke-dashoffset:0; opacity:1; }
        11.8%  { stroke-dashoffset:0; opacity:0; }
        85.99% { stroke-dashoffset:0; opacity:0; }
        86%    { stroke-dashoffset:0; opacity:1; }
        100%   { stroke-dashoffset:var(--dashTitle); opacity:1; }
      }
      .a-titleStroke{
        fill:transparent;
        stroke:var(--ink);
        stroke-width:.32;
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-dasharray:var(--dashTitle);
        stroke-dashoffset:var(--dashTitle);
        animation:k-titleStrokeDrawPauseRetract var(--cycle) var(--ease) infinite both;
      }

      /* =========================================
         CAIXAS
         ========================================= */
      @keyframes k-boxDraw{
        0%,10%  { stroke-dashoffset:var(--dash); opacity:0; }
        14%     { opacity:1; }
        24%     { stroke-dashoffset:0; opacity:1; }
        82%     { stroke-dashoffset:0; opacity:1; }
        92%     { stroke-dashoffset:var(--dash); opacity:1; }
        100%    { stroke-dashoffset:var(--dash); opacity:0; }
      }
      .a-box{
        stroke-dasharray:var(--dash);
        stroke-dashoffset:var(--dash);
        animation:k-boxDraw var(--cycle) var(--ease) infinite both;
      }

      @keyframes k-fillSoft{
        0%,15%  { opacity:0; }
        18%     { opacity:1; }
        82%     { opacity:1; }
        92%     { opacity:.35; }
        100%    { opacity:0; }
      }
      .a-fill{
        opacity:0;
        animation:k-fillSoft var(--cycle) linear infinite both;
      }

      /* =========================================
         TEXTOS internos
         ========================================= */
      @keyframes k-textFill{
        0%,18%  { opacity:0; }
        22%     { opacity:.22; }
        26%     { opacity:1; }
        82%     { opacity:1; }
        92%     { opacity:.45; }
        100%    { opacity:0; }
      }
      .a-textFill{
        opacity:0;
        animation:k-textFill var(--cycle) linear infinite both;
      }

      @keyframes k-textStroke{
        0%,17%  { stroke-dashoffset:var(--dashText); opacity:1; }
        25%     { stroke-dashoffset:0; opacity:1; }
        27%     { stroke-dashoffset:0; opacity:0; }
        85.99%  { stroke-dashoffset:0; opacity:0; }
        86%     { stroke-dashoffset:0; opacity:1; }
        100%    { stroke-dashoffset:var(--dashText); opacity:1; }
      }
      .a-textStroke{
        fill:transparent;
        stroke:var(--ink);
        stroke-width:.28;
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-dasharray:var(--dashText);
        stroke-dashoffset:var(--dashText);
        animation:k-textStroke var(--cycle) var(--ease) infinite both;
      }

      /* =========================================
         SETAS / LINHAS DE CONVERGÊNCIA
         ========================================= */
      @keyframes k-lineDraw{
        0%,28%  { stroke-dashoffset:var(--dash); opacity:0; }
        32%     { opacity:1; }
        42%     { stroke-dashoffset:0; opacity:1; }
        82%     { stroke-dashoffset:0; opacity:1; }
        92%     { stroke-dashoffset:var(--dash); opacity:1; }
        100%    { stroke-dashoffset:var(--dash); opacity:0; }
      }
      .a-line{
        stroke-dasharray:var(--dash);
        stroke-dashoffset:var(--dash);
        animation:k-lineDraw var(--cycle) var(--ease) infinite both;
      }

      @keyframes k-headIn{
        0%,38%  { opacity:0; transform:scale(.85); transform-origin:center; }
        42%     { opacity:1; transform:scale(1); }
        82%     { opacity:1; transform:scale(1); }
        92%     { opacity:.35; transform:scale(.96); }
        100%    { opacity:0; transform:scale(.85); }
      }
      .a-head{
        opacity:0;
        animation:k-headIn var(--cycle) var(--ease) infinite both;
      }

      /* =========================================
         BLOCO CENTRAL — entra depois
         ========================================= */
      @keyframes k-centerBox{
        0%,42%  { stroke-dashoffset:var(--dash); opacity:0; }
        46%     { opacity:1; }
        56%     { stroke-dashoffset:0; opacity:1; }
        82%     { stroke-dashoffset:0; opacity:1; }
        92%     { stroke-dashoffset:var(--dash); opacity:1; }
        100%    { stroke-dashoffset:var(--dash); opacity:0; }
      }
      .a-centerBox{
        stroke-dasharray:var(--dash);
        stroke-dashoffset:var(--dash);
        animation:k-centerBox var(--cycle) var(--ease) infinite both;
      }

      @keyframes k-centerFill{
        0%,47%  { opacity:0; }
        50%     { opacity:1; }
        82%     { opacity:1; }
        92%     { opacity:.4; }
        100%    { opacity:0; }
      }
      .a-centerFill{
        opacity:0;
        animation:k-centerFill var(--cycle) linear infinite both;
      }

      @keyframes k-centerTextFill{
        0%,50%  { opacity:0; }
        54%     { opacity:.25; }
        58%     { opacity:1; }
        82%     { opacity:1; }
        92%     { opacity:.45; }
        100%    { opacity:0; }
      }
      .a-centerTextFill{
        opacity:0;
        animation:k-centerTextFill var(--cycle) linear infinite both;
      }

      @keyframes k-centerTextStroke{
        0%,49%  { stroke-dashoffset:var(--dashText); opacity:1; }
        57%     { stroke-dashoffset:0; opacity:1; }
        59%     { stroke-dashoffset:0; opacity:0; }
        85.99%  { stroke-dashoffset:0; opacity:0; }
        86%     { stroke-dashoffset:0; opacity:1; }
        100%    { stroke-dashoffset:var(--dashText); opacity:1; }
      }
      .a-centerTextStroke{
        fill:transparent;
        stroke:var(--ink);
        stroke-width:.30;
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-dasharray:var(--dashText);
        stroke-dashoffset:var(--dashText);
        animation:k-centerTextStroke var(--cycle) var(--ease) infinite both;
      }

      /* =========================================
         IGUALDADE FINAL
         ========================================= */
      @keyframes k-formulaFill{
        0%,60%  { opacity:0; }
        64%     { opacity:.18; }
        69%     { opacity:1; }
        85.99%  { opacity:1; }
        95%     { opacity:.45; }
        100%    { opacity:0; }
      }
      .a-formulaFill{
        opacity:0;
        animation:k-formulaFill var(--cycle) linear infinite both;
      }

      @keyframes k-formulaStroke{
        0%,59%  { stroke-dashoffset:var(--dashTitle); opacity:1; }
        68%     { stroke-dashoffset:0; opacity:1; }
        70%     { stroke-dashoffset:0; opacity:0; }
        85.99%  { stroke-dashoffset:0; opacity:0; }
        86%     { stroke-dashoffset:0; opacity:1; }
        100%    { stroke-dashoffset:var(--dashTitle); opacity:1; }
      }
      .a-formulaStroke{
        fill:transparent;
        stroke:var(--ink);
        stroke-width:.28;
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-dasharray:var(--dashTitle);
        stroke-dashoffset:var(--dashTitle);
        animation:k-formulaStroke var(--cycle) var(--ease) infinite both;
      }

      @media (prefers-reduced-motion:reduce){
        .a-titleFill,.a-titleStroke,.a-box,.a-fill,.a-textFill,.a-textStroke,
        .a-line,.a-head,.a-centerBox,.a-centerFill,.a-centerTextFill,
        .a-centerTextStroke,.a-formulaFill,.a-formulaStroke{
          animation:none !important;
        }
        .a-titleFill,.a-fill,.a-textFill,.a-centerFill,.a-centerTextFill,.a-formulaFill{
          opacity:1 !important;
        }
        .a-titleStroke,.a-textStroke,.a-centerTextStroke,.a-formulaStroke{
          opacity:0 !important;
        }
      }
    </style>
  </defs>

  <!-- fundo -->
  <rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>

  <!-- ===================== título ===================== -->
  <text x="460" y="42" font-size="28" class="u-center u-bold a-titleFill">
    Independência e interseção
  </text>
  <text x="460" y="42" font-size="28" class="u-center u-bold a-titleStroke">
    Independência e interseção
  </text>

  <!-- ===================== blocos laterais ===================== -->
  <!-- fills -->
  <rect x="118" y="120" width="180" height="82" rx="18" class="fill-soft a-fill"/>
  <rect x="622" y="120" width="180" height="82" rx="18" class="fill-soft a-fill"/>

  <!-- contornos -->
  <rect x="118" y="120" width="180" height="82" rx="18" class="u-box a-box"/>
  <rect x="622" y="120" width="180" height="82" rx="18" class="u-box a-box"/>

  <!-- textos laterais -->
  <text x="208" y="161" font-size="30" class="u-center u-bold a-textFill">P(A)</text>
  <text x="208" y="161" font-size="30" class="u-center u-bold a-textStroke">P(A)</text>

  <text x="712" y="161" font-size="30" class="u-center u-bold a-textFill">P(B)</text>
  <text x="712" y="161" font-size="30" class="u-center u-bold a-textStroke">P(B)</text>

  <!-- ===================== linhas de convergência ===================== -->
  <line x1="298" y1="161" x2="398" y2="161" class="u-stroke a-line" stroke-width="2.2"/>
  <line x1="622" y1="161" x2="522" y2="161" class="u-stroke a-line" stroke-width="2.2"/>

  <!-- pontas -->
  <polygon points="398,161 386,154 386,168" class="u-head a-head"/>
  <polygon points="522,161 534,154 534,168" class="u-head a-head"/>

  <!-- ponto central sutil antes da caixa -->
  <circle cx="460" cy="161" r="5.5" class="fill-mid a-head"/>

  <!-- ===================== bloco central ===================== -->
  <rect x="366" y="112" width="188" height="98" rx="20" class="fill-strong a-centerFill"/>
  <rect x="366" y="112" width="188" height="98" rx="20" class="u-box a-centerBox"/>

  <text x="460" y="161" font-size="28" class="u-center u-bold a-centerTextFill">P(A ∩ B)</text>
  <text x="460" y="161" font-size="28" class="u-center u-bold a-centerTextStroke">P(A ∩ B)</text>

  <!-- ===================== rodapé / equivalência ===================== -->
  <text x="460" y="276" font-size="24" class="u-center u-bold a-formulaFill">
    P(A ∩ B) = P(A) · P(B)
  </text>
  <text x="460" y="276" font-size="24" class="u-center u-bold a-formulaStroke">
    P(A ∩ B) = P(A) · P(B)
  </text>

  <!-- linha auxiliar sutil -->
  <line x1="222" y1="244" x2="698" y2="244"
        class="u-stroke a-line" stroke-width="1.35"
        opacity=".55"/>

</svg>