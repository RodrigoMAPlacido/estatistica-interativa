      </g>
    </symbol>
  </defs>

  <!-- CENA SUPERIOR -->
  <g id="top-scene-position" class="a-top-move">
    <g id="top-scene-scale" class="a-top-scale">
      <g id="top-scene-content">

        <g transform="translate(220 160)">
          <text x="-50" y="0" class="label-top">A</text>
          <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
          <line x1="-100" y1="270" x2="100" y2="270" class="base-line"/>
          <text x="0" y="340" class="label-rank a-hide-ranks">1º</text>
        </g>

        <g transform="translate(440 160)">
          <text x="-50" y="0" class="label-top">B</text>
          <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
          <line x1="-360" y1="270" x2="360" y2="270" class="podio-line-expand"/>
          <text x="0" y="340" class="label-rank a-hide-ranks">2º</text>
        </g>

        <g transform="translate(660 160)">
          <text x="-50" y="0" class="label-top">C</text>
          <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
          <line x1="-100" y1="270" x2="100" y2="270" class="base-line"/>
          <text x="0" y="340" class="label-rank a-hide-ranks">3º</text>
        </g>

        <g transform="translate(880 160)">
          <text x="-50" y="0" class="label-top">D</text>
          <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
        </g>

        <g transform="translate(1100 160)">
          <text x="-50" y="0" class="label-top">E</text>
          <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
        </g>

        <text x="440" y="500" class="podio-text a-show-podio-top">Pódio</text>
      </g>
    </g>
  </g>

  <!-- CENA INFERIOR ÚNICA -->
  <g class="a-show-bottom">
    <g transform="translate(230,440)">
      <g transform="scale(0.72)">
        <g>
          <!-- A -->
          <g transform="translate(220 160)">
            <g class="a-swap-a">
              <text x="-50" y="0" class="label-top">A</text>
              <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
            </g>
            <line x1="-100" y1="270" x2="100" y2="270" class="base-line"/>
          </g>

          <!-- B -->
          <g transform="translate(440 160)">
            <g class="a-swap-b">
              <text x="-50" y="0" class="label-top">B</text>
              <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
            </g>
            <line x1="-330" y1="270" x2="330" y2="270" class="base-line"/>
          </g>

          <!-- C -->
          <g transform="translate(660 160)">
            <g class="a-swap-c">
              <text x="-50" y="0" class="label-top">C</text>
              <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
            </g>
            <line x1="-100" y1="270" x2="100" y2="270" class="base-line"/>
          </g>

          <!-- D -->
          <g transform="translate(880 160)">
            <g class="a-swap-d">
              <text x="-50" y="0" class="label-top">D</text>
              <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
            </g>
          </g>

          <!-- E -->
          <g transform="translate(1100 160)">
            <g class="a-swap-e">
              <text x="-50" y="0" class="label-top">E</text>
              <use href="#runner-mirrored" x="-100" y="40" width="200" height="220"/>
            </g>
          </g>

          <!-- destaque D/E -->
          <rect x="773" y="80" width="440" height="370" rx="18" ry="18"
                class="highlight-box a-draw-box-de"/>

          <!-- destaque ABC -->
          <rect x="93" y="80" width="690" height="450" rx="18" ry="18"
                class="highlight-box a-draw-box-abc"/>

          <text x="440" y="500" class="podio-text" style="opacity:1">Pódio</text>
        </g>
      </g>
    </g>
  </g>

  <!-- IGUAL 1 -->
  <g transform="translate(0,40)" class="a-show-equal-de">
    <line x1="655" y1="355" x2="745" y2="355" class="eq-line"/>
    <line x1="655" y1="405" x2="745" y2="405" class="eq-line"/>
  </g>

  <!-- IGUAL 2 -->
  <g transform="translate(0,40)" class="a-show-equal-abc">
    <line x1="655" y1="355" x2="745" y2="355" class="eq-line"/>
    <line x1="655" y1="405" x2="745" y2="405" class="eq-line"/>
  </g>

  <!-- FÓRMULA FINAL -->
  <g transform="translate(0,-100)">
  <g class="comb-summary">
    <text x="700" y="760" class="formula-title">Total de combinações</text>

    <g>
      <text x="600" y="840" class="formula">
        C<tspan baseline-shift="sub" font-size="70%">5,3</tspan>
        <tspan class="roman"> = </tspan>
      </text>

      <g>
        <text x="740" y="810" class="formula roman">A<tspan baseline-shift="sub" font-size="70%">5,3</tspan></text>
        <line x1="665" y1="845" x2="815" y2="845" class="formula-line"/>
        <text x="740" y="885" class="formula roman">3!</text>
      </g>

      <text x="905" y="840" class="formula roman">= 10</text>
    </g>
  </g>
  </g>
</svg>