<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1400 920"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Transição de arranjo para combinação com pódio</title>
  <desc id="desc">
    A cena começa com os três primeiros lugares indicados por 1º, 2º e 3º.
    Em seguida, esses lugares passam a ser interpretados como um pódio.
    A cena superior reduz de escala e sobe. Depois surge uma única cena inferior.
    Nessa cena, primeiro D e E são destacados e trocados, mostrando que mudar
    os elementos fora do pódio não altera a escolha. Em seguida, sem desaparecer
    a fila inferior, o destaque passa para A, B e C, que trocam de posição entre si,
    mostrando que a ordem interna também não altera o grupo escolhido.
    Ao final aparece a fórmula da combinação.
  </desc>

  <defs>
    <style>
      :root{
        --bg:#ffffff;
        --ink:#000000;
        --runner:#0f172a;
        --font:"et-book","ETBook","Georgia",serif;
        --cycle:30s;
        --ease:ease-in-out;
        --boxDash:1600;
      }

      svg{ background:var(--bg); }

      text{
        fill:var(--ink);
        font-family:var(--font);
        user-select:none;
      }

      .label-top{
        font-size:64px;
        font-style:italic;
        text-anchor:middle;
      }

      .label-rank{
        font-size:46px;
        text-anchor:middle;
      }

      .base-line{
        stroke:var(--ink);
        stroke-width:13;
        stroke-linecap:square;
        fill:none;
      }

      .runner{
        fill:var(--runner);
        stroke:none;
      }

      .eq-line{
        stroke:var(--ink);
        stroke-width:10;
        stroke-linecap:round;
        fill:none;
      }

      .podio-text{
        font-size:54px;
        font-weight:700;
        text-anchor:middle;
        opacity:0;
      }

      .formula-title{
        font-size:44px;
        font-weight:800;
        text-anchor:middle;
        dominant-baseline:middle;
      }

      .formula-line{
        stroke:var(--ink);
        stroke-width:2.2;
        stroke-linecap:round;
      }

      .formula{
        font-size:40px;
        font-style:italic;
        text-anchor:middle;
        dominant-baseline:middle;
      }

      .formula.roman,
      .roman{
        font-style:normal;
      }

      .highlight-box{
        fill:none;
        stroke:var(--ink);
        stroke-width:2.4;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:non-scaling-stroke;
        stroke-dasharray:var(--boxDash);
        stroke-dashoffset:var(--boxDash);
        opacity:0;
      }

      /* =====================================================
         CENA SUPERIOR
         ===================================================== */

      @keyframes k-top-move{
        0%,18%   { transform:translate(0px,40px); }
        24%,74%  { transform:translate(230px,-40px); }
        80%,100% { transform:translate(0px,40px); }
      }

      @keyframes k-top-scale{
        0%,18%   { transform:scale(1); }
        24%,74%  { transform:scale(0.72); }
        80%,100% { transform:scale(1); }
      }

      .a-top-move{
        transform:translate(0px,40px);
        animation:k-top-move var(--cycle) var(--ease) infinite both;
      }

      .a-top-scale{
        transform:scale(1);
        transform-origin:0 0;
        animation:k-top-scale var(--cycle) var(--ease) infinite both;
      }

      /* =====================================================
         1º, 2º, 3º -> PÓDIO
         ===================================================== */

      @keyframes k-hide-ranks{
        0%,10%   { opacity:1; }
        14%,100% { opacity:0; }
      }

      .a-hide-ranks{
        animation:k-hide-ranks var(--cycle) linear infinite both;
      }

      @keyframes k-podio-line-expand{
        0%,10%{
          transform:scaleX(0.28);
        }
        14%,74%{
          transform:scaleX(1);
        }
        78%,100%{
          transform:scaleX(1);
        }
      }

      .podio-line-expand{
        stroke:var(--ink);
        stroke-width:13;
        stroke-linecap:square;
        fill:none;
        transform-box:fill-box;
        transform-origin:center;
        animation:k-podio-line-expand var(--cycle) var(--ease) infinite both;
      }

      @keyframes k-show-podio-top{
        0%,13%{
          opacity:0;
          transform:translateY(8px);
        }
        17%,98%{
          opacity:1;
          transform:translateY(0px);
        }
        98%.5,100%{
          opacity:0;
          transform:translateY(0px);
        }
      }

      .a-show-podio-top{
        animation:k-show-podio-top var(--cycle) ease-out infinite both;
      }

      /* =====================================================
         CENA INFERIOR ÚNICA
         ===================================================== */

      @keyframes k-show-bottom{
        0%,29%   { opacity:0; }
        32%,73%  { opacity:1; }
        76%,100% { opacity:0; }
      }

      .a-show-bottom{
        opacity:0;
        animation:k-show-bottom var(--cycle) linear infinite both;
      }

      /* =====================================================
         IGUAL D/E
         ===================================================== */

      @keyframes k-show-equal-de{
        0%,35%   { opacity:0; }
        37%,48%  { opacity:1; }
        50%,100% { opacity:0; }
      }

      .a-show-equal-de{
        opacity:0;
        animation:k-show-equal-de var(--cycle) linear infinite both;
      }

      /* =====================================================
         IGUAL ABC
         ===================================================== */

      @keyframes k-show-equal-abc{
        0%,58%   { opacity:0; }
        60%,73%  { opacity:1; }
        76%,100% { opacity:0; }
      }

      .a-show-equal-abc{
        opacity:0;
        animation:k-show-equal-abc var(--cycle) linear infinite both;
      }

      /* =====================================================
         DESTAQUE D/E
         ===================================================== */

      @keyframes k-draw-box-de{
        0%,33%{
          opacity:0;
          stroke-dashoffset:var(--boxDash);
        }
        35%{
          opacity:1;
          stroke-dashoffset:var(--boxDash);
        }
        39%,46%{
          opacity:1;
          stroke-dashoffset:0;
        }
        49%{
          opacity:1;
          stroke-dashoffset:var(--boxDash);
        }
        50%,100%{
          opacity:0;
          stroke-dashoffset:var(--boxDash);
        }
      }

      .a-draw-box-de{
        animation:k-draw-box-de var(--cycle) var(--ease) infinite both;
      }

      /* =====================================================
         DESTAQUE ABC
         ===================================================== */

      @keyframes k-draw-box-abc{
        0%,56%{
          opacity:0;
          stroke-dashoffset:var(--boxDash);
        }
        58%{
          opacity:1;
          stroke-dashoffset:var(--boxDash);
        }
        62%,71%{
          opacity:1;
          stroke-dashoffset:0;
        }
        74%{
          opacity:1;
          stroke-dashoffset:var(--boxDash);
        }
        76%,100%{
          opacity:0;
          stroke-dashoffset:var(--boxDash);
        }
      }

      .a-draw-box-abc{
        animation:k-draw-box-abc var(--cycle) var(--ease) infinite both;
      }

      /* =====================================================
         TROCA D/E
         Mantém continuidade na cena inferior.
         Depois da troca, retorna ao estado original.
         ===================================================== */

      @keyframes k-swap-d{
        0%,38%   { transform:translateX(0px); }
        41%,48%  { transform:translateX(220px); }
        50%,100% { transform:translateX(0px); }
      }

      @keyframes k-swap-e{
        0%,38%   { transform:translateX(0px); }
        41%,48%  { transform:translateX(-220px); }
        50%,100% { transform:translateX(0px); }
      }

      .a-swap-d{
        animation:k-swap-d var(--cycle) var(--ease) infinite both;
      }

      .a-swap-e{
        animation:k-swap-e var(--cycle) var(--ease) infinite both;
      }

      /* =====================================================
         TROCA ABC
         ===================================================== */

@keyframes k-swap-a{
  0%,61%    { transform:translate(0px,0px); }    /* ABC */
  62%,63.2% { transform:translate(220px,0px); }  /* BAC */
  64.2%,65.4% { transform:translate(440px,0px); }/* BCA */
  66.4%,67.6% { transform:translate(440px,0px); }/* CBA */
  68.6%,69.8% { transform:translate(220px,0px); }/* CAB */
  70.8%,72% { transform:translate(0px,0px); }    /* ACB */
  73%,100%  { transform:translate(0px,0px); }    /* ABC */
}

@keyframes k-swap-b{
  0%,61%    { transform:translate(0px,0px); }      /* ABC */
  62%,63.2% { transform:translate(-220px,0px); }   /* BAC */
  64.2%,65.4% { transform:translate(-220px,0px); } /* BCA */
  66.4%,67.6% { transform:translate(0px,0px); }    /* CBA */
  68.6%,69.8% { transform:translate(220px,0px); }  /* CAB */
  70.8%,72% { transform:translate(220px,0px); }    /* ACB */
  73%,100%  { transform:translate(0px,0px); }      /* ABC */
}

@keyframes k-swap-c{
  0%,61%    { transform:translate(0px,0px); }      /* ABC */
  62%,63.2% { transform:translate(0px,0px); }      /* BAC */
  64.2%,65.4% { transform:translate(-220px,0px); } /* BCA */
  66.4%,67.6% { transform:translate(-440px,0px); } /* CBA */
  68.6%,69.8% { transform:translate(-440px,0px); } /* CAB */
  70.8%,72% { transform:translate(-220px,0px); }   /* ACB */
  73%,100%  { transform:translate(0px,0px); }      /* ABC */
}
      .a-swap-a{
        animation:k-swap-a var(--cycle) var(--ease) infinite both;
      }

      .a-swap-b{
        animation:k-swap-b var(--cycle) var(--ease) infinite both;
      }

      .a-swap-c{
        animation:k-swap-c var(--cycle) var(--ease) infinite both;
      }

      /* =====================================================
         FÓRMULA FINAL
         ===================================================== */

      @keyframes k-show-comb-summary{
        0%,80%{
          opacity:0;
          transform:translateY(10px);
        }
        84%,97%{
          opacity:1;
          transform:translateY(0px);
        }
        100%{
          opacity:0;
          transform:translateY(0px);
        }
      }

      .comb-summary{
        opacity:0;
        animation:k-show-comb-summary var(--cycle) ease-out infinite both;
      }

      @media (prefers-reduced-motion:reduce){
        .a-top-move,
        .a-top-scale,
        .a-hide-ranks,
        .podio-line-expand,
        .a-show-podio-top,
        .a-show-bottom,
        .a-show-equal-de,
        .a-show-equal-abc,
        .a-draw-box-de,
        .a-draw-box-abc,
        .a-swap-d,
        .a-swap-e,
        .a-swap-a,
        .a-swap-b,
        .a-swap-c,
        .comb-summary{
          animation:none !important;
        }
      }
    </style>

    <symbol id="runner-mirrored" viewBox="0 0 1167 1280">
      <g transform="translate(1167,1280) scale(-0.1,-0.1)" class="runner">
        <path d="M9270 12789 c-229 -29 -473 -124 -657 -256 -272 -194 -468 -494 -539
