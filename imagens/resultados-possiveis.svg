<?xml version="1.0" encoding="UTF-8"?>
<!-- ===========================================
   RESULTADOS POSSÍVEIS (DADO) — título: fill começa ANTES do fim do traço; stroke some quando fill ~1
   - Ajuste pedido:
     1) o texto sólido começa a surgir perto do fim do traçado (sem “vazio”)
     2) quando o sólido estiver praticamente cheio, o traçado desaparece
     3) independente do traçado do quadro do dado
   =========================================== -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 820 260"
     width="820" height="260"
     role="img"
     aria-labelledby="title desc"
     style="background:#ffffff">

  <title id="title">Resultados possíveis</title>
  <desc id="desc">
    Um quadrado representa a face superior do dado. Após o contorno ser traçado,
    os pontos alternam em sequência, mostrando 1, 2, 3, 4, 5 e 6 como resultados possíveis.
  </desc>

  <defs>
    <style>
      :root{
        --ink:#111827;
        --font:"et-book","ETBook","Georgia",serif;

        --cycle:10.8s;
        --ease:ease-in-out;

        --dash:1400;
        --dashText:900;
      }

      text{ font-family:var(--font); fill:var(--ink); user-select:none; letter-spacing:.13px }
      .u-center{ text-anchor:middle }
      .u-bold{ font-weight:700 }
      .u-stroke{ stroke:var(--ink); fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px }
      .u-ns{ vector-effect:non-scaling-stroke }

      /* ===== quadro (a-draw) — NÃO vincular ao título ===== */
      @keyframes k-drawLine{
        0%   { stroke-dashoffset:var(--dash); opacity:0; }
        7%   { opacity:1; }
        28%  { stroke-dashoffset:0;          opacity:1; }
        86%  { stroke-dashoffset:0;          opacity:1; }
        94%  { stroke-dashoffset:var(--dash); opacity:1; }
        100% { stroke-dashoffset:var(--dash); opacity:0; }
      }
      .a-draw{
        stroke-dasharray:var(--dash);
        stroke-dashoffset:var(--dash);
        animation:k-drawLine var(--cycle) var(--ease) infinite both;
      }

      /* =========================================================
         TÍTULO EM DUAS CAMADAS — “ANTI-VAZIO” (SEU PADRÃO)
         - Fill: começa a aparecer ANTES (24%→30%) e chega a 1 no fim do traço
         - Stroke: traça até 30% e some logo após (30%→30.8%)
         ========================================================= */

      /* fill começa antes e “encosta” no fim do traço */
      @keyframes k-titleFillOpacity{
        0%,5.5% { opacity:0; }
        6%      { opacity:0.15; }  /* já começa a surgir */
        9.5%    { opacity:0.70; }
        11.2%    { opacity:0.92; }
        30%      { opacity:1; }     /* cheio no fim do traço */
        92%      { opacity:1; }
        94%,100% { opacity:0; }
      }
      .a-titleFill{
        opacity:0;
        animation:k-titleFillOpacity var(--cycle) linear infinite both;
      }

      /* stroke some quando o fill já está praticamente cheio */
      @keyframes k-titleStrokeDrawThenOff{
        0%    { stroke-dashoffset:var(--dashText); opacity:0; }
        6%    { opacity:1; }
        30%   { stroke-dashoffset:0; opacity:1; }   /* fim do traço */
        30% { stroke-dashoffset:0; opacity:0; }   /* some logo após o sólido “assentar” */
        100%  { stroke-dashoffset:0; opacity:0; }
      }
      .a-titleStroke{
        fill:transparent;
        stroke:var(--ink);
        stroke-width:.9;
        stroke-linecap:round;
        stroke-linejoin:round;
        stroke-dasharray:var(--dashText);
        stroke-dashoffset:var(--dashText);
        animation:k-titleStrokeDrawThenOff var(--cycle) var(--ease) infinite both;
      }

      /* ===== pips ===== */
      .pip{ fill:var(--ink); }

      /* ===== Sequência 1→6 ===== */
      @keyframes k-face1{ 0%,28.9%{opacity:0} 31%{opacity:1} 38%{opacity:1} 40%{opacity:0} 100%{opacity:0} }
      @keyframes k-face2{ 0%,39.9%{opacity:0} 42%{opacity:1} 49%{opacity:1} 51%{opacity:0} 100%{opacity:0} }
      @keyframes k-face3{ 0%,50.9%{opacity:0} 53%{opacity:1} 60%{opacity:1} 62%{opacity:0} 100%{opacity:0} }
      @keyframes k-face4{ 0%,61.9%{opacity:0} 64%{opacity:1} 71%{opacity:1} 73%{opacity:0} 100%{opacity:0} }
      @keyframes k-face5{ 0%,72.9%{opacity:0} 75%{opacity:1} 82%{opacity:1} 84%{opacity:0} 100%{opacity:0} }
      @keyframes k-face6{ 0%,83.9%{opacity:0} 86%{opacity:1} 92%{opacity:1} 94%{opacity:0} 100%{opacity:0} }

      .a-face{
        opacity:0;
        animation-duration:var(--cycle);
        animation-timing-function:var(--ease);
        animation-iteration-count:infinite;
        animation-fill-mode:both;
      }
      .f1{ animation-name:k-face1; }
      .f2{ animation-name:k-face2; }
      .f3{ animation-name:k-face3; }
      .f4{ animation-name:k-face4; }
      .f5{ animation-name:k-face5; }
      .f6{ animation-name:k-face6; }

      @media (prefers-reduced-motion:reduce){
        .a-draw,.a-face,.a-titleFill,.a-titleStroke{ animation:none !important; }
        .a-titleFill{ opacity:1; }
        .a-titleStroke{ opacity:0; }
        .a-draw{ stroke-dashoffset:0; opacity:1; }
        .f1{ opacity:1; }
        .f2,.f3,.f4,.f5,.f6{ opacity:0; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>

  <!-- título (fill por baixo; stroke por cima e some quando fill ~1) -->
  <text x="410" y="30" font-size="30" class="u-center u-bold a-titleFill">Resultados possíveis</text>
  <text x="410" y="30" font-size="30" class="u-center u-bold a-titleStroke">Resultados possíveis</text>

  <!-- quadro -->
  <rect x="325" y="72" width="170" height="170" rx="10"
        class="u-stroke u-ns a-draw"/>

  <!-- pips -->
  <g class="a-face f1"><circle class="pip" cx="410" cy="157" r="12"/></g>

  <g class="a-face f2">
    <circle class="pip" cx="370" cy="117" r="12"/>
    <circle class="pip" cx="450" cy="197" r="12"/>
  </g>

  <g class="a-face f3">
    <circle class="pip" cx="370" cy="117" r="12"/>
    <circle class="pip" cx="410" cy="157" r="12"/>
    <circle class="pip" cx="450" cy="197" r="12"/>
  </g>

  <g class="a-face f4">
    <circle class="pip" cx="370" cy="117" r="12"/>
    <circle class="pip" cx="450" cy="117" r="12"/>
    <circle class="pip" cx="370" cy="197" r="12"/>
    <circle class="pip" cx="450" cy="197" r="12"/>
  </g>

  <g class="a-face f5">
    <circle class="pip" cx="370" cy="117" r="12"/>
    <circle class="pip" cx="450" cy="117" r="12"/>
    <circle class="pip" cx="410" cy="157" r="12"/>
    <circle class="pip" cx="370" cy="197" r="12"/>
    <circle class="pip" cx="450" cy="197" r="12"/>
  </g>

  <g class="a-face f6">
    <circle class="pip" cx="370" cy="117" r="12"/>
    <circle class="pip" cx="370" cy="157" r="12"/>
    <circle class="pip" cx="370" cy="197" r="12"/>
    <circle class="pip" cx="450" cy="117" r="12"/>
    <circle class="pip" cx="450" cy="157" r="12"/>
    <circle class="pip" cx="450" cy="197" r="12"/>
  </g>

</svg>
