<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1180 520"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Independência entre eventos com duas moedas</title>
  <desc id="desc">
    Duas moedas representam os resultados H e T. Após a cena inicial,
    o produto dos espaços amostrais é apresentado, mostrando os quatro
    resultados possíveis do experimento conjunto.
  </desc>

  <style>
    :root{
      --ink:#1f2937;
      --line:#374151;

      --face:#eef2f7;
      --face-side:#9ca3af;

      --shadow:rgba(31,41,55,.13);

      --font:"et-book","ETBembo","Georgia","Times New Roman",serif;
      --font-sans:"Arial","Helvetica",sans-serif;

      --cycle:12s;
      --ease:ease-in-out;

      --dash:1600;
      --dashText:900;
    }

    svg{
      background:#ffffff;
    }

    text{
      font-family:var(--font);
      fill:var(--ink);
      user-select:none;
    }

    .u-stroke{
      stroke:var(--ink);
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
      vector-effect:non-scaling-stroke;
    }

    .u-center{
      text-anchor:middle;
      dominant-baseline:middle;
    }

    .edge{
      stroke:var(--ink);
      stroke-width:4.5;
      stroke-linejoin:round;
      stroke-linecap:round;
      vector-effect:non-scaling-stroke;
    }

    .thin-edge{
      stroke:var(--line);
      stroke-width:2.2;
      stroke-linejoin:round;
      stroke-linecap:round;
      vector-effect:non-scaling-stroke;
    }

    .shadow{
      fill:var(--shadow);
    }

    .coinSymbol{
      font-family:var(--font-sans);
      font-size:78px;
      font-weight:700;
      fill:var(--line);
      text-anchor:middle;
      dominant-baseline:middle;
      user-select:none;
    }

    .coinGroup{
      transform-box:fill-box;
      transform-origin:center;
      animation:coinLaunchEI var(--cycle) infinite var(--ease);
    }

    .shadowPulse{
      transform-box:fill-box;
      transform-origin:center;
      animation:shadowPulseEI var(--cycle) infinite var(--ease);
    }

    .coinFaceSvg{
      fill:none;
      stroke:var(--line);
      stroke-width:1.2;
      stroke-linecap:round;
      stroke-linejoin:round;
      vector-effect:non-scaling-stroke;
    }

    /* =========================
       CENA 1
       ========================= */

    .scene1Group{
      animation:scene1Opacity var(--cycle) linear infinite both;
    }

    .sampleLine{
      stroke-width:2.4;
      stroke-dasharray:var(--dash);
      stroke-dashoffset:var(--dash);
      animation:k-drawLineAfterCoin var(--cycle) ease-in-out infinite both;
    }

    .mathFill{
      font-size:30px;
      font-weight:500;
      opacity:0;
      animation:k-textFillAfterCoin var(--cycle) linear infinite both;
    }

    .mathStroke{
      font-size:30px;
      font-weight:500;
      fill:transparent;
      stroke:var(--ink);
      stroke-width:.75;
      stroke-dasharray:var(--dashText);
      stroke-dashoffset:var(--dashText);
      animation:k-textStrokeAfterCoin var(--cycle) ease-in-out infinite both;
    }

    .noteFill{
      font-size:30px;
      opacity:0;
      animation:k-textFillAfterCoin var(--cycle) linear infinite both;
    }

    .noteStroke{
      font-size:30px;
      fill:transparent;
      stroke:var(--ink);
      stroke-width:.7;
      stroke-dasharray:var(--dashText);
      stroke-dashoffset:var(--dashText);
      animation:k-textStrokeAfterCoin var(--cycle) ease-in-out infinite both;
    }

    /* =========================
       CENA 2
       ========================= */

    .scene2Group{
      opacity:0;
      animation:scene2Opacity var(--cycle) linear infinite both;
    }

    .scene2BigFill{
      font-size:50px;
      font-weight:500;
      opacity:0;
      animation:scene2TextFill var(--cycle) linear infinite both;
    }

    .scene2BigStroke{
      font-size:50px;
      font-weight:500;
      fill:transparent;
      stroke:var(--ink);
      stroke-width:.85;
      stroke-dasharray:var(--dashText);
      stroke-dashoffset:var(--dashText);
      animation:scene2TextStroke var(--cycle) ease-in-out infinite both;
    }

    .scene2MidFill{
      font-size:42px;
      font-weight:500;
      opacity:0;
      animation:scene2TextFill var(--cycle) linear infinite both;
    }

    .scene2MidStroke{
      font-size:42px;
      font-weight:500;
      fill:transparent;
      stroke:var(--ink);
      stroke-width:.8;
      stroke-dasharray:var(--dashText);
      stroke-dashoffset:var(--dashText);
      animation:scene2TextStroke var(--cycle) ease-in-out infinite both;
    }

    .scene2SmallFill{
      font-size:32px;
      font-weight:500;
      opacity:0;
      animation:scene2TextFill var(--cycle) linear infinite both;
    }

    .scene2SmallStroke{
      font-size:32px;
      font-weight:500;
      fill:transparent;
      stroke:var(--ink);
      stroke-width:.75;
      stroke-dasharray:1400;
      stroke-dashoffset:1400;
      animation:scene2TextStrokeLong var(--cycle) ease-in-out infinite both;
    }

    @keyframes coinLaunchEI{
      0%, 5.8667%{
        transform:translateY(0) rotate(0deg) scaleY(1);
      }
      10.2667%{
        transform:translateY(-26px) rotate(180deg) scaleY(.55);
      }
      14.6667%{
        transform:translateY(-62px) rotate(360deg) scaleY(.18);
      }
      19.0667%{
        transform:translateY(-98px) rotate(540deg) scaleY(.50);
      }
      23.4667%{
        transform:translateY(-132px) rotate(720deg) scaleY(.14);
      }
      27.8667%{
        transform:translateY(-98px) rotate(900deg) scaleY(.48);
      }
      32.2667%{
        transform:translateY(-58px) rotate(1080deg) scaleY(.20);
      }
      36.6667%{
        transform:translateY(-22px) rotate(1260deg) scaleY(.58);
      }
      41.0667%{
        transform:translateY(0) rotate(1440deg) scaleY(1);
      }
      100%{
        transform:translateY(0) rotate(1440deg) scaleY(1);
      }
    }

    @keyframes shadowPulseEI{
      0%, 5.8667%{
        opacity:.40;
        transform:scaleX(1) scaleY(1);
      }
      14.6667%{
        opacity:.24;
        transform:scaleX(.84) scaleY(.90);
      }
      23.4667%{
        opacity:.12;
        transform:scaleX(.66) scaleY(.80);
      }
      32.2667%{
        opacity:.22;
        transform:scaleX(.82) scaleY(.90);
      }
      41.0667%{
        opacity:.40;
        transform:scaleX(1) scaleY(1);
      }
      100%{
        opacity:.40;
        transform:scaleX(1) scaleY(1);
      }
    }

    @keyframes k-drawLineAfterCoin{
      0%,41.0667% { opacity:0; stroke-dashoffset:var(--dash); }
      44.0%      { opacity:1; }
      52.8%      { stroke-dashoffset:0; }
      60.0%      { opacity:1; }
      68.0%,100% { opacity:0; stroke-dashoffset:0; }
    }

    @keyframes k-textFillAfterCoin{
      0%,44.0%   { opacity:0; }
      49.8667%   { opacity:.55; }
      55.7333%   { opacity:1; }
      60.0%      { opacity:1; }
      68.0%,100% { opacity:0; }
    }

    @keyframes k-textStrokeAfterCoin{
      0%,42.6667% { opacity:0; stroke-dashoffset:var(--dashText); }
      46.9333%    { opacity:1; }
      57.2%       { stroke-dashoffset:0; }
      58.0%       { opacity:0; }
      100%        { opacity:0; stroke-dashoffset:0; }
    }

    @keyframes scene1Opacity{
      0%,68%   { opacity:1; }
      74%,100% { opacity:0; }
    }

    @keyframes scene2Opacity{
      0%,68%      { opacity:0; }
      74%,93%     { opacity:1; }
      100%        { opacity:0; }
    }

    @keyframes scene2TextFill{
      0%,72%    { opacity:0; }
      78%       { opacity:.55; }
      82%       { opacity:1; }
      93%       { opacity:1; }
      100%      { opacity:0; }
    }

    @keyframes scene2TextStroke{
      0%,70%    { opacity:0; stroke-dashoffset:var(--dashText); }
      74%       { opacity:1; }
      82%       { stroke-dashoffset:0; opacity:1; }
      83%       { opacity:0; }
      100%      { opacity:0; stroke-dashoffset:0; }
    }

    @keyframes scene2TextStrokeLong{
      0%,70%    { opacity:0; stroke-dashoffset:1400; }
      74%       { opacity:1; }
      83%       { stroke-dashoffset:0; opacity:1; }
      84%       { opacity:0; }
      100%      { opacity:0; stroke-dashoffset:0; }
    }
  </style>

  <!-- =========================
       CENA 1
       ========================= -->
  <g class="scene1Group">

    <!-- MOEDA 1 -->
    <g transform="translate(90 72)">
      <ellipse class="shadow shadowPulse" cx="220" cy="248" rx="62" ry="12"/>

      <g class="coinGroup">
        <ellipse cx="220" cy="146" rx="52" ry="14" fill="var(--face-side)" class="edge"/>
        <rect x="168" y="138" width="104" height="10" rx="5" fill="var(--face-side)" class="edge"/>
        <ellipse cx="220" cy="138" rx="72" ry="72" fill="var(--face)" class="edge"/>
        <ellipse cx="220" cy="138" rx="60" ry="60" fill="none" class="thin-edge" stroke-dasharray="3 5"/>

        <g class="coinFaceSvg" transform="translate(220 138) scale(4) translate(-24 -24)">
          <path d="M20.9381,35.5a8.3256,8.3256,0,0,1-.8828-5.2227s-3.5308-1.3609-4.1193-2.0965.4414-1.8022.3678-4.0457"/>
          <path d="M17.444,22.9949c.4781.9808-2.2068,1.3241-2.3907.1471s2.06-2.4275,2.17-3.7515,1.6883-7.5029,8.2754-6.8411c7.687.7724,6.8043,8.6065,6.694,10.0409a2.9114,2.9114,0,0,1-1.5448,4.8182,8.1786,8.1786,0,0,0,.0368,4.6342"/>
        </g>
      </g>
    </g>

    <!-- MOEDA 2 -->
    <g transform="translate(650 72)">
      <ellipse class="shadow shadowPulse" cx="220" cy="248" rx="62" ry="12"/>

      <g class="coinGroup">
        <ellipse cx="220" cy="146" rx="52" ry="14" fill="var(--face-side)" class="edge"/>
        <rect x="168" y="138" width="104" height="10" rx="5" fill="var(--face-side)" class="edge"/>
        <ellipse cx="220" cy="138" rx="72" ry="72" fill="var(--face)" class="edge"/>
        <ellipse cx="220" cy="138" rx="60" ry="60" fill="none" class="thin-edge" stroke-dasharray="3 5"/>
        <text x="220" y="145" class="coinSymbol">$</text>
      </g>
    </g>

    <!-- LINHAS -->
    <line x1="110" y1="366" x2="510" y2="366" class="u-stroke sampleLine"/>
    <line x1="670" y1="366" x2="1070" y2="366" class="u-stroke sampleLine"/>

    <!-- TEXTOS -->
    <text x="310" y="406" class="mathStroke u-center">Ω₁ = {H, T}</text>
    <text x="310" y="406" class="mathFill u-center">Ω₁ = {H, T}</text>

    <text x="870" y="406" class="mathStroke u-center">Ω₂ = {H, T}</text>
    <text x="870" y="406" class="mathFill u-center">Ω₂ = {H, T}</text>

    <text x="590" y="468" class="noteStroke u-center">H : Cara  e  T : Coroa</text>
    <text x="590" y="468" class="noteFill u-center">H : Cara  e  T : Coroa</text>
  </g>

  <!-- =========================
       CENA 2
       ========================= -->
  <g class="scene2Group">
    <text x="590" y="170" class="scene2BigStroke u-center">Ω₁ · Ω₂</text>
    <text x="590" y="170" class="scene2BigFill u-center">Ω₁ · Ω₂</text>

    <text x="590" y="245" class="scene2MidStroke u-center">2 · 2 = 4</text>
    <text x="590" y="245" class="scene2MidFill u-center">2 · 2 = 4</text>

    <text x="590" y="340" class="scene2SmallStroke u-center">
      Ω<tspan dy="6" font-size="65%">total</tspan><tspan dy="-6" font-size="100%"> = {(H,H); (H,T); (T,H); (T,T)}</tspan>
    </text>
    <text x="590" y="340" class="scene2SmallFill u-center">
      Ω<tspan dy="6" font-size="65%">total</tspan><tspan dy="-6" font-size="100%"> = {(H,H); (H,T); (T,H); (T,T)}</tspan>
    </text>
  </g>

</svg>