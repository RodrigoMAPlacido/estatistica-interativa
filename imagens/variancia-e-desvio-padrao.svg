<svg viewBox="0 0 1450 920"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc"
     preserveAspectRatio="xMidYMid meet">

  <title id="title">Variância e desvio padrão de uma variável aleatória discreta</title>
  <desc id="desc">
    Dois quadros mostram a mesma distribuição discreta. No primeiro, a variância
    é sugerida pelas distâncias em torno do valor esperado. No segundo, o desvio
    padrão aparece como uma distância típica na mesma escala da variável.
  </desc>

  <defs>
    <style>
      :root{
        --ink:#111827;
        --ink-soft:#64748b;
        --grid:#d1d5db;
        --shade:rgba(17,24,39,.06);
        --shade-soft:rgba(17,24,39,.08);
        --font:"et-book","ETBook","Georgia","Times New Roman",serif;
        --cycle:8.2s;
        --ease:ease-in-out;
      }

      svg{
        background:#ffffff;
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
      }

      .u-stroke{
        stroke:var(--ink);
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:non-scaling-stroke;
      }

      .u-panel{
        stroke-width:1.2;
        rx:22;
        ry:22;
      }

      .label{
        font-size:36px;
        font-weight:600;
        text-anchor:middle;
      }

      .small{
        font-size:22px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .axis{
        stroke-width:2;
      }

      .grid line{
        stroke:var(--grid);
        stroke-width:1;
      }

      .xlab{
        font-size:22px;
        text-anchor:middle;
      }

      .ylab{
        font-size:22px;
        fill:var(--ink-soft);
        text-anchor:middle;
      }

      .bar{
        fill:var(--ink);
        transform-box:fill-box;
        transform-origin:bottom;
        animation:growY var(--cycle) var(--ease) infinite;
      }

      .meanLine{
        stroke:var(--ink);
        stroke-width:2.2;
        opacity:0;
        animation:appearMean var(--cycle) var(--ease) infinite;
      }

      .meanText{
        font-size:24px;
        text-anchor:middle;
        opacity:0;
        animation:appearMeanText var(--cycle) var(--ease) infinite;
      }

      .varSeg{
        stroke:var(--ink-soft);
        stroke-width:2.2;
        stroke-dasharray:7 6;
        opacity:0;
        animation:appearVarSeg var(--cycle) var(--ease) infinite;
      }

      .varText{
        font-size:21px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:appearVarText var(--cycle) var(--ease) infinite;
      }

      .sigmaBand{
        fill:var(--shade-soft);
        opacity:0;
        animation:appearSigmaBand var(--cycle) var(--ease) infinite;
      }

      .sigmaEdge{
        stroke:var(--ink);
        stroke-width:1.8;
        stroke-dasharray:6 6;
        opacity:0;
        animation:appearSigmaEdge var(--cycle) var(--ease) infinite;
      }

      .sigmaArrow{
        stroke:var(--ink);
        stroke-width:1.8;
        fill:none;
        opacity:0;
        animation:appearSigmaArrow var(--cycle) var(--ease) infinite;
      }

      .sigmaText{
        font-size:22px;
        text-anchor:middle;
        opacity:0;
        animation:appearSigmaText var(--cycle) var(--ease) infinite;
      }

      .noteBox{
        fill:var(--shade);
        stroke:var(--ink);
        stroke-width:1.5;
        rx:12;
        ry:12;
        vector-effect:non-scaling-stroke;
      }

      .note{
        font-size:21px;
        text-anchor:middle;
      }

      @keyframes growY{
        0%,18%{
          transform:scaleY(0);
          opacity:0;
        }
        28%,84%{
          transform:scaleY(1);
          opacity:1;
        }
        100%{
          transform:scaleY(0);
          opacity:0;
        }
      }

      @keyframes appearMean{
        0%,34%{
          opacity:0;
        }
        44%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearMeanText{
        0%,38%{
          opacity:0;
        }
        48%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearVarSeg{
        0%,44%{
          opacity:0;
        }
        54%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearVarText{
        0%,50%{
          opacity:0;
        }
        60%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearSigmaBand{
        0%,44%{
          opacity:0;
        }
        54%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearSigmaEdge{
        0%,46%{
          opacity:0;
        }
        56%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearSigmaArrow{
        0%,52%{
          opacity:0;
        }
        62%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearSigmaText{
        0%,56%{
          opacity:0;
        }
        66%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @media (prefers-reduced-motion:reduce){
        .bar,.meanLine,.meanText,.varSeg,.varText,.sigmaBand,.sigmaEdge,.sigmaArrow,.sigmaText{
          animation:none;
          opacity:1;
          transform:none;
        }
      }

            .varStep1{
        font-size:20px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:appearVarStep1 var(--cycle) var(--ease) infinite;
      }

      .varStep2{
        font-size:20px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:appearVarStep2 var(--cycle) var(--ease) infinite;
      }

      .distBracket,
      .distTick{
        stroke:var(--ink-soft);
        stroke-width:2;
        fill:none;
        vector-effect:non-scaling-stroke;
        opacity:0;
        animation:appearDistMeasure var(--cycle) var(--ease) infinite;
      }

      .varSquare{
        fill:var(--shade-soft);
        stroke:var(--ink);
        stroke-width:1.5;
        vector-effect:non-scaling-stroke;
        opacity:0;
        animation:appearVarSquare var(--cycle) var(--ease) infinite;
      }

      @keyframes appearVarStep1{
        0%,46%{
          opacity:0;
        }
        56%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearDistMeasure{
        0%,52%{
          opacity:0;
        }
        62%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearVarStep2{
        0%,60%{
          opacity:0;
        }
        70%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearVarSquare{
        0%,64%{
          opacity:0;
        }
        74%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }
    </style>
  </defs>

    <!-- =========================================================
       1 — VARIÂNCIA
       ========================================================= -->
  <g transform="translate(10,170)">
    <rect x="0" y="0" width="680" height="560" class="u-panel u-stroke"/>

    <text x="340" y="55" class="label">Variância</text>
    <text x="340" y="90" class="small">média ponderada dos quadrados das distâncias até E(X)</text>

    <g transform="translate(100,160)">
      <g class="grid">
        <line x1="0" y1="220" x2="520" y2="220"/>
        <line x1="0" y1="150" x2="520" y2="150"/>
        <line x1="0" y1="80"  x2="520" y2="80"/>
        <line x1="0" y1="10"  x2="520" y2="10"/>
      </g>

      <g class="u-stroke axis">
        <line x1="0" y1="290" x2="520" y2="290"/>
        <line x1="0" y1="290" x2="0" y2="10"/>
      </g>

      <text x="-80" y="200" transform="rotate(-90 -80 150)" class="ylab">p(x)</text>

      <!-- barras -->
      <rect x="34"  y="220" width="52" height="70"  class="bar" style="animation-delay:0s"/>
      <rect x="134" y="150" width="52" height="140" class="bar" style="animation-delay:.10s"/>
      <rect x="234" y="95"  width="52" height="195" class="bar" style="animation-delay:.20s"/>
      <rect x="334" y="170" width="52" height="120" class="bar" style="animation-delay:.30s"/>
      <rect x="434" y="235" width="52" height="55"  class="bar" style="animation-delay:.40s"/>

      <!-- linha do valor esperado -->
      <line x1="250" y1="10" x2="250" y2="290" class="meanLine"/>
      <text x="250" y="-20" class="meanText">E(X)</text>

      <!-- rótulos de x -->
      <text x="60"  y="320" class="xlab">x₁</text>
      <text x="160" y="320" class="xlab">x₂</text>
      <text x="260" y="320" class="xlab">x₃</text>
      <text x="360" y="320" class="xlab">x₄</text>
      <text x="460" y="320" class="xlab">x₅</text>

      <!-- etapa 1 -->
      <text x="260" y="354" class="varStep1">1. medir as distâncias em relação a E(X)</text>
<g transform="translate(0,-360)">
      <line x1="60"  y1="364" x2="250" y2="364" class="distBracket"/>
      <line x1="60"  y1="356" x2="60"  y2="372" class="distTick"/>
      <line x1="250" y1="356" x2="250" y2="372" class="distTick"/>

      <line x1="160" y1="364" x2="250" y2="364" class="distBracket"/>
      <line x1="160" y1="356" x2="160" y2="372" class="distTick"/>
      <line x1="250" y1="356" x2="250" y2="372" class="distTick"/>

      <line x1="250" y1="364" x2="260" y2="364" class="distBracket"/>
      <line x1="250" y1="356" x2="250" y2="372" class="distTick"/>
      <line x1="260" y1="356" x2="260" y2="372" class="distTick"/>

      <line x1="250" y1="364" x2="360" y2="364" class="distBracket"/>
      <line x1="250" y1="356" x2="250" y2="372" class="distTick"/>
      <line x1="360" y1="356" x2="360" y2="372" class="distTick"/>

      <line x1="250" y1="364" x2="460" y2="364" class="distBracket"/>
      <line x1="250" y1="356" x2="250" y2="372" class="distTick"/>
      <line x1="460" y1="356" x2="460" y2="372" class="distTick"/>
</g>
      <!-- etapa 2 -->
      <text x="260" y="385" class="varStep2">2. elevar essas distâncias ao quadrado</text>
<g transform="translate(0,-375)">

      <!-- quadrados das distâncias -->
      <rect x="42"  y="400" width="36" height="36" class="varSquare"/>
      <rect x="150" y="416" width="20" height="20" class="varSquare"/>
      <rect x="257" y="430" width="6"  height="6"  class="varSquare"/>
      <rect x="349" y="414" width="22" height="22" class="varSquare"/>
      <rect x="440" y="396" width="40" height="40" class="varSquare"/>
    </g>
    </g>
  </g>
  <!-- =========================================================
       2 — DESVIO PADRÃO
       ========================================================= -->
  <g transform="translate(730,170)">
    <rect x="0" y="0" width="680" height="560" class="u-panel u-stroke"/>

    <text x="340" y="55" class="label">Desvio padrão</text>
    <text x="340" y="90" class="small">dispersão na mesma escala de X</text>

    <g transform="translate(100,130)">
      <g class="grid">
        <line x1="0" y1="220" x2="520" y2="220"/>
        <line x1="0" y1="150" x2="520" y2="150"/>
        <line x1="0" y1="80"  x2="520" y2="80"/>
        <line x1="0" y1="10"  x2="520" y2="10"/>
      </g>

      <g class="u-stroke axis">
        <line x1="0" y1="290" x2="520" y2="290"/>
        <line x1="0" y1="290" x2="0" y2="10"/>
      </g>

      <text x="-80" y="200" transform="rotate(-90 -80 150)" class="ylab">p(x)</text>
      <text x="260" y="365" class="ylab">valores possíveis de X</text>

      <!-- barras -->
      <rect x="34"  y="220" width="52" height="70"  class="bar" style="animation-delay:0s"/>
      <rect x="134" y="150" width="52" height="140" class="bar" style="animation-delay:.10s"/>
      <rect x="234" y="95"  width="52" height="195" class="bar" style="animation-delay:.20s"/>
      <rect x="334" y="170" width="52" height="120" class="bar" style="animation-delay:.30s"/>
      <rect x="434" y="235" width="52" height="55"  class="bar" style="animation-delay:.40s"/>

      <!-- faixa de um desvio padrão -->
      <rect x="170" y="10" width="160" height="280" class="sigmaBand"/>
      <line x1="170" y1="10" x2="170" y2="290" class="sigmaEdge"/>
      <line x1="330" y1="10" x2="330" y2="290" class="sigmaEdge"/>

      <!-- linha central -->
      <line x1="250" y1="10" x2="250" y2="290" class="meanLine"/>
      <text x="250" y="-6" class="meanText">E(X)</text>

      <!-- seta sigma -->
      <line x1="255" y1="44" x2="320" y2="44" class="sigmaArrow"/>
      <g transform="translate(-5,0)">
      <polyline points="322,39 330,44 322,49" class="sigmaArrow"/>
      </g>
      <text x="292" y="66" class="sigmaText"> + σ</text>

            <!-- seta sigma -->
            <g transform="translate(-75,0)">
      <line x1="255" y1="44" x2="320" y2="44" class="sigmaArrow"/>
      <g transform="translate(-80,0) rotate(180 330 44)">
      <polyline points="322,39 330,44 322,49" class="sigmaArrow"/>
      </g>
      </g>
      <text x="210" y="66" class="sigmaText">- σ</text>

      <!-- rótulos x -->
      <text x="60"  y="322" class="xlab">x₁</text>
      <text x="160" y="322" class="xlab">x₂</text>
      <text x="260" y="322" class="xlab">x₃</text>
      <text x="360" y="322" class="xlab">x₄</text>
      <text x="460" y="322" class="xlab">x₅</text>
    </g>

    <g transform="translate(145,510)">
      <text x="195" y="22" class="note">σ mede a dispersão na unidade original da variável</text>
    </g>
  </g>
</svg>