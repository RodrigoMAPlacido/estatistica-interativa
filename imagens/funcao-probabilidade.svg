<svg viewBox="0 0 1000 720"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc"
     preserveAspectRatio="xMidYMid meet">

  <title id="title">Função de probabilidade do número de caras em dois lançamentos</title>
  <desc id="desc">
    Gráfico de barras representando a função de probabilidade da variável aleatória X,
    definida como o número de caras obtidas em dois lançamentos de moeda.
    Os valores possíveis são 0, 1 e 2, com probabilidades 1/4, 1/2 e 1/4.
  </desc>

  <defs>
    <style>
      :root{
        --ink:#111827;
        --ink-soft:#64748b;
        --grid:#e5e7eb;
        --shade:rgba(17,24,39,.06);
        --font:"et-book","ETBook","Georgia","Times New Roman",serif;
        --cycle:7.5s;
        --ease:ease-in-out;
      }

      svg{
        background:#ffffff;
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
      }

      .u-stroke{
        stroke:var(--ink);
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:non-scaling-stroke;
      }

      .u-panel{
        stroke-width:1.2;
        rx:22;
        ry:22;
      }

      .title{
        font-size:34px;
        font-weight:600;
        text-anchor:middle;
      }

      .small{
        font-size:22px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .axis{
        stroke-width:2;
      }

      .grid line{
        stroke:var(--grid);
        stroke-width:1;
      }

      .xlab{
        font-size:24px;
        text-anchor:middle;
      }

      .ylab{
        font-size:22px;
        fill:var(--ink-soft);
        text-anchor:middle;
      }

      .ticklab{
        font-size:19px;
        fill:var(--ink-soft);
        text-anchor:end;
      }

      .bar{
        fill:var(--ink);
        transform-box:fill-box;
        transform-origin:bottom;
        animation:growY var(--cycle) var(--ease) infinite;
      }

      .probText{
        font-size:24px;
        text-anchor:middle;
        opacity:0;
        animation:appearText var(--cycle) var(--ease) infinite;
      }

      .outcomeText{
        font-size:19px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:appearOutcome var(--cycle) var(--ease) infinite;
      }

      .noteBox{
        fill:var(--shade);
        stroke:var(--ink);
        stroke-width:1.5;
        rx:12;
        ry:12;
        vector-effect:non-scaling-stroke;
      }

      .note{
        font-size:22px;
        text-anchor:middle;
      }

      @keyframes growY{
        0%,18%{
          transform:scaleY(0);
          opacity:0;
        }
        30%,84%{
          transform:scaleY(1);
          opacity:1;
        }
        100%{
          transform:scaleY(0);
          opacity:0;
        }
      }

      @keyframes appearText{
        0%,30%{
          opacity:0;
        }
        40%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearOutcome{
        0%,38%{
          opacity:0;
        }
        48%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @media (prefers-reduced-motion:reduce){
        .bar,.probText,.outcomeText{
          animation:none;
          opacity:1;
          transform:none;
        }
      }
    </style>
  </defs>

  <!-- painel -->
  <g transform="translate(40,150)">
    <rect x="0" y="-40" width="840" height="500" class="u-panel u-stroke"/>

    <text x="420" y="10" class="title">Função de Probabilidade</text>
    <text x="420" y="34" class="small">X = número de caras em dois lançamentos de moeda</text>

    <g transform="translate(140,90)">
      <!-- grade -->
      <g class="grid">
        <line x1="0" y1="260" x2="560" y2="260"/>
        <line x1="0" y1="140" x2="560" y2="140"/>
        <line x1="0" y1="20"  x2="560" y2="20"/>
      </g>

      <!-- eixos -->
      <g class="u-stroke axis">
        <line x1="0" y1="260" x2="560" y2="260"/>
        <line x1="0" y1="260" x2="0" y2="0"/>
      </g>

      <!-- rótulos do eixo y -->
      <text x="-20" y="264" class="ticklab">0</text>
      <text x="-20" y="144" class="ticklab">1/4</text>
      <text x="-20" y="24"  class="ticklab">1/2</text>

      <text x="-82" y="130" transform="rotate(-90 -82 130)" class="ylab">p(x)</text>
      <text x="280" y="356" class="ylab">valores possíveis de X</text>

      <!-- barras -->
      <rect x="65"  y="140" width="72" height="120" class="bar" style="animation-delay:0s"/>
      <rect x="245" y="20"  width="72" height="240" class="bar" style="animation-delay:.18s"/>
      <rect x="425" y="140" width="72" height="120" class="bar" style="animation-delay:.36s"/>

      <!-- rótulos x -->
      <text x="101" y="295" class="xlab">0</text>
      <text x="281" y="295" class="xlab">1</text>
      <text x="461" y="295" class="xlab">2</text>

      <!-- probabilidades -->
      <text x="101" y="122" class="probText" style="animation-delay:0s">p(0) = 1/4</text>
      <text x="281" y="2"   class="probText" style="animation-delay:.18s">p(1) = 1/2</text>
      <text x="461" y="122" class="probText" style="animation-delay:.36s">p(2) = 1/4</text>

      <!-- correspondência com os resultados -->
      <text x="101" y="322" class="outcomeText" style="animation-delay:.08s">(T,T)</text>
      <text x="281" y="322" class="outcomeText" style="animation-delay:.26s">(H,T), (T,H)</text>
      <text x="461" y="322" class="outcomeText" style="animation-delay:.44s">(H,H)</text>
    </g>


  </g>
</svg>