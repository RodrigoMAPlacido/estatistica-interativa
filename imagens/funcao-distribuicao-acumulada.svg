<svg viewBox="0 0 1000 720"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc"
     preserveAspectRatio="xMidYMid meet">

  <title id="title">Função de distribuição acumulada do número de caras em dois lançamentos</title>
  <desc id="desc">
    Gráfico em degraus representando a função de distribuição acumulada da variável
    aleatória X, definida como o número de caras obtidas em dois lançamentos de moeda.
    Os valores acumulados são F(0)=1/4, F(1)=3/4 e F(2)=1.
  </desc>

  <defs>
    <style>
      :root{
        --ink:#111827;
        --ink-soft:#64748b;
        --grid:#e5e7eb;
        --shade:rgba(17,24,39,.06);
        --font:"et-book","ETBook","Georgia","Times New Roman",serif;
        --cycle:7.5s;
        --ease:ease-in-out;
      }

      svg{
        background:#ffffff;
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
      }

      .u-stroke{
        stroke:var(--ink);
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:non-scaling-stroke;
      }

      .u-panel{
        stroke-width:1.2;
        rx:22;
        ry:22;
      }

      .title{
        font-size:34px;
        font-weight:600;
        text-anchor:middle;
      }

      .small{
        font-size:22px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .axis{
        stroke-width:2;
      }

      .grid line{
        stroke:var(--grid);
        stroke-width:1;
      }

      .xlab{
        font-size:24px;
        text-anchor:middle;
      }

      .ylab{
        font-size:22px;
        fill:var(--ink-soft);
        text-anchor:middle;
      }

      .ticklab{
        font-size:19px;
        fill:var(--ink-soft);
        text-anchor:end;
      }

      .stepSeg{
        stroke:var(--ink);
        stroke-width:4;
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        opacity:0;
        animation:drawSeg var(--cycle) var(--ease) infinite both;
      }

      .stepDot{
        fill:var(--ink);
        opacity:0;
        animation:appearDot var(--cycle) var(--ease) infinite;
      }

      .valueText{
        font-size:24px;
        text-anchor:middle;
        opacity:0;
        animation:appearText var(--cycle) var(--ease) infinite;
      }

      .outcomeText{
        font-size:19px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:appearOutcome var(--cycle) var(--ease) infinite;
      }

      .noteBox{
        fill:var(--shade);
        stroke:var(--ink);
        stroke-width:1.5;
        rx:12;
        ry:12;
        vector-effect:non-scaling-stroke;
      }

      .note{
        font-size:22px;
        text-anchor:middle;
      }

      @keyframes drawSeg{
        0%,18%{
          opacity:0;
          stroke-dashoffset:140;
        }
        30%,84%{
          opacity:1;
          stroke-dashoffset:0;
        }
        100%{
          opacity:0;
          stroke-dashoffset:0;
        }
      }

      @keyframes appearDot{
        0%,30%{
          opacity:0;
          transform:scale(.5);
        }
        40%,84%{
          opacity:1;
          transform:scale(1);
        }
        100%{
          opacity:0;
          transform:scale(.5);
        }
      }

      @keyframes appearText{
        0%,32%{
          opacity:0;
        }
        42%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes appearOutcome{
        0%,40%{
          opacity:0;
        }
        50%,84%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @media (prefers-reduced-motion:reduce){
        .stepSeg,.stepDot,.valueText,.outcomeText{
          animation:none;
          opacity:1;
          transform:none;
          stroke-dashoffset:0;
        }
      }
    </style>
  </defs>

  <!-- painel -->
  <g transform="translate(40,150)">
    <rect x="0" y="-40" width="840" height="500" class="u-panel u-stroke"/>

    <text x="420" y="10" class="title">Função de Distribuição Acumulada</text>
    <text x="420" y="34" class="small">X = número de caras em dois lançamentos de moeda</text>

    <g transform="translate(140,90)">
      <!-- grade -->
      <g class="grid">
        <line x1="0" y1="260" x2="560" y2="260"/>
        <line x1="0" y1="200" x2="560" y2="200"/>
        <line x1="0" y1="80"  x2="560" y2="80"/>
        <line x1="0" y1="20"  x2="560" y2="20"/>
      </g>

      <!-- eixos -->
      <g class="u-stroke axis">
        <line x1="0" y1="260" x2="560" y2="260"/>
        <line x1="0" y1="260" x2="0" y2="0"/>
      </g>

      <!-- rótulos do eixo y -->
      <text x="-20" y="264" class="ticklab">0</text>
      <text x="-20" y="204" class="ticklab">1/4</text>
      <text x="-20" y="84"  class="ticklab">3/4</text>
      <text x="-20" y="24"  class="ticklab">1</text>

      <text x="-82" y="130" transform="rotate(-90 -82 130)" class="ylab">F(x)</text>
      <text x="280" y="356" class="ylab">valores possíveis de X</text>

      <!-- degraus -->
      <line x1="0"   y1="260" x2="101" y2="260"
            class="stepSeg"
            style="stroke-dasharray:101; animation-delay:0s"/>

      <line x1="101" y1="260" x2="101" y2="200"
            class="stepSeg"
            style="stroke-dasharray:60; animation-delay:0s"/>

      <line x1="101" y1="200" x2="281" y2="200"
            class="stepSeg"
            style="stroke-dasharray:180; animation-delay:.18s"/>

      <line x1="281" y1="200" x2="281" y2="80"
            class="stepSeg"
            style="stroke-dasharray:120; animation-delay:.18s"/>

      <line x1="281" y1="80"  x2="461" y2="80"
            class="stepSeg"
            style="stroke-dasharray:180; animation-delay:.36s"/>

      <line x1="461" y1="80"  x2="461" y2="20"
            class="stepSeg"
            style="stroke-dasharray:60; animation-delay:.36s"/>

      <line x1="461" y1="20"  x2="560" y2="20"
            class="stepSeg"
            style="stroke-dasharray:99; animation-delay:.54s"/>

      <!-- pontos -->
      <circle cx="101" cy="200" r="5.5" class="stepDot" style="animation-delay:.08s"/>
      <circle cx="281" cy="80"  r="5.5" class="stepDot" style="animation-delay:.26s"/>
      <circle cx="461" cy="20"  r="5.5" class="stepDot" style="animation-delay:.44s"/>

      <!-- rótulos x -->
      <text x="101" y="295" class="xlab">0</text>
      <text x="281" y="295" class="xlab">1</text>
      <text x="461" y="295" class="xlab">2</text>

      <!-- valores acumulados -->
      <text x="160" y="184" class="valueText" style="animation-delay:.08s">F(0) = 1/4</text>
      <text x="350" y="64"  class="valueText" style="animation-delay:.26s">F(1) = 3/4</text>
      <text x="510" y="4"   class="valueText" style="animation-delay:.44s">F(2) = 1</text>

      <!-- conjuntos acumulados -->
      <text x="101" y="322" class="outcomeText" style="animation-delay:.14s">(T,T)</text>
      <text x="281" y="322" class="outcomeText" style="animation-delay:.32s">(T,T), (H,T), (T,H)</text>
      <text x="461" y="322" class="outcomeText" style="animation-delay:.50s">Ω</text>
    </g>
  </g>


</svg>