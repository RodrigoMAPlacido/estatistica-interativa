<?xml version="1.0" encoding="UTF-8"?>
<!-- ===========================================
   PROBABILIDADE CONDICIONAL — padrão unificado (u-*/a-*)
   Ideia:
   - Ω com dois eventos A e B (sobreposição visível)
   - Condicionar: “dado B” ⇒ restringe o universo aos casos em B
   - Destaca A∩B e mostra a razão P(A|B)=P(A∩B)/P(B)
   Padrão:
   - Título: a-text (stroke+fill)
   - Conectores: a-draw
   - Blocos com pausas claras (janelas de animação)
   =========================================== -->
<svg viewBox="0 0 1500 750"
     xmlns="http://www.w3.org/2000/svg"
     role="graphics-document"
     aria-labelledby="title desc">

  <title id="title">Probabilidade condicional — animação didática (CSS only)</title>
  <desc id="desc">
    O espaço amostral Ω contém dois eventos A e B (com interseção).
    A animação mostra a ideia de condicionar: dado que B ocorreu, o “universo” passa a ser B.
    Em seguida, destaca A∩B e apresenta a fórmula P(A|B)=P(A∩B)/P(B com setas para as regiões.
  </desc>

  <defs>
    <style>
      /* ============ Variáveis globais ============ */
      :root{
        --ink:#111827;
        --font:"et-book","ETBook","Georgia",serif;

        --cycle:10s;
        --ease:ease-in-out;

        --dash:4000;
        --dashText:900;

        --soft:rgba(17,24,39,.06);
        --dim:rgba(17,24,39,.10);
        --mid:rgba(17,24,39,.18);
        --strong:rgba(17,24,39,.28);
      }

      /* ============ Base/utilitárias (u-*) ============ */
      text{ font-family:var(--font); fill:var(--ink); user-select:none; }
      .u-stroke{ stroke:var(--ink); fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .u-box{ stroke-width:3; rx:15; }
      .u-panel{ stroke-width:2; rx:12; }
      .u-center{ text-anchor:middle; }
      .u-title{ font-weight:700; font-size:45px; text-anchor:middle; }
      .u-label{ font-size:34px; font-weight:500; text-anchor:middle; }
      .u-mini{ font-size:22px; font-weight:500; }
      .u-micro{ font-size:18px; font-weight:500; }
      .u-muted{ fill:rgba(17,24,39,.65); }

      /* ============ Traçado tipo tronco/ramo (a-*) ============ */
      @keyframes k-drawLine{
        0%   { stroke-dashoffset:var(--dash); opacity:0; }
        10%  { opacity:1; }
        42%  { stroke-dashoffset:0;           opacity:1; }
        62%  { stroke-dashoffset:0;           opacity:1; }
        92%  { stroke-dashoffset:var(--dash); opacity:1; }
        100% { stroke-dashoffset:var(--dash); opacity:0; }
      }
      .a-draw{
        stroke-dasharray:var(--dash);
        stroke-dashoffset:var(--dash);
        animation:k-drawLine var(--cycle) var(--ease) infinite both;
        animation-delay:var(--delay,0s);
      }

      /* ============ Texto (stroke+fill) ============ */
      @keyframes k-textStroke{
        0%   { stroke-dashoffset:var(--dashText); opacity:0; }
        10%  { opacity:1; }
        45%  { stroke-dashoffset:0; opacity:1; }
        60%  { stroke-dashoffset:0; opacity:1; }
        92%  { stroke-dashoffset:var(--dashText); opacity:1; }
        100% { stroke-dashoffset:var(--dashText); opacity:0; }
      }
      @keyframes k-textFill{
        0%,18%   { fill:transparent; }
        34%,74%  { fill:var(--ink); }
        92%,100% { fill:transparent; }
      }
      .a-text{
        stroke:var(--ink);
        stroke-width:.9;
        fill:transparent;
        stroke-dasharray:var(--dashText);
        stroke-dashoffset:var(--dashText);
        animation:
          k-textStroke var(--cycle) var(--ease) infinite both,
          k-textFill   var(--cycle) var(--ease) infinite both;
        animation-delay:var(--delay,0s), var(--delay,0s);
      }

      /* ============ Blocos (timing) ============ */
      /* 0–18%: entrada (título+conectores+painéis)
         20–36%: bloco 1 (situação “antes”)
         36–42%: pausa
         44–60%: bloco 2 (dado B: restringe universo)
         60–66%: pausa
         68–84%: bloco 3/4 (destaca A∩B + fórmula)
         84–90%: pausa
         90–100%: retraço (feito pelos a-*)
      */

      /* ===== preenchimentos dos conjuntos no painel 1 ===== */
      .setA{ fill:var(--mid); stroke:var(--ink); stroke-width:2.2; }
      .setB{ fill:var(--strong); stroke:var(--ink); stroke-width:2.2; }

      /* Visibilidade do “estado inicial” (bloco 1) */
      @keyframes showBase{
        0%,20% { opacity:0; }
        24%,40% { opacity:1; }
        42%,100%{ opacity:0; }
      }
      .baseState{ opacity:0; animation:showBase var(--cycle) var(--ease) infinite both; }

      /* ===== efeito “condicionar em B” (dim fora de B, enfatiza B) ===== */
      @keyframes showCond{
        0%,44% { opacity:0; }
        48%,64%{ opacity:1; }
        66%,100%{opacity:0;}
      }
      .condState{ opacity:0; animation:showCond var(--cycle) var(--ease) infinite both; }

      /* máscara visual: escurece tudo fora de B (no painel 2) */
      .dimOutside{
        fill:rgba(17,24,39,.10);
      }

      /* ===== destaque da interseção A∩B (bloco 3) ===== */
      @keyframes showInter{
        0%,68% { opacity:0; }
        72%,90%{ opacity:1; }
        92%,100%{opacity:0;}
      }
      .interState{ opacity:0; animation:showInter var(--cycle) var(--ease) infinite both; }

      .interFill{ fill:rgba(17,24,39,.40); stroke:var(--ink); stroke-width:2.2; }

      /* ===== fórmula e setas (bloco 3) ===== */
      .formulaState{ opacity:0; animation:showInter var(--cycle) var(--ease) infinite both; }

      /* ===== acessibilidade ===== */
      @media (prefers-reduced-motion:reduce){
        .a-draw,.a-text{ animation:none; stroke-dashoffset:0; opacity:1; }
        .a-text{ fill:var(--ink); }
        .baseState,.condState,.interState,.formulaState{ animation:none; opacity:1; }
      }
    </style>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>

    <!-- ========= Defs geométricas (para consistência entre painéis) ========= -->
    <!-- “Ω” como retângulo arredondado interno -->
    <g id="omegaBox">
      <rect x="0" y="0" width="360" height="280" rx="16" ry="16" class="u-stroke" stroke-width="2" fill="rgba(17,24,39,.03)"/>
      <text x="22" y="34" class="u-mini">Ω</text>
    </g>

    <!-- Elipses A e B no mesmo sistema local -->
    <!-- A à esquerda; B à direita; sobreposição central -->
    <g id="setsAB">
      <ellipse cx="145" cy="150" rx="120" ry="92" class="setA"/>
      <ellipse cx="215" cy="150" rx="120" ry="92" class="setB"/>
      <text x="105" y="110" class="u-mini">A</text>
      <text x="252" y="110" class="u-mini">B</text>
    </g>

    <!-- Interseção: desenhada como lente “aproximada” por path manual (boa o suficiente visualmente) -->
    <!-- (lente centrada na sobreposição) -->
    <g id="interLens">
      <path class="interFill"
            d="M180,78
               C220,92 250,118 258,150
               C250,182 220,208 180,222
               C160,214 142,198 132,178
               C124,162 124,138 132,122
               C142,102 160,86 180,78 Z"/>
    </g>
  </defs>

  <!-- ===== TÍTULO ===== -->
  <g>
    <rect x="410" y="60" width="680" height="110" class="u-stroke u-box"/>
    <text x="750" y="110" class="u-title a-text u-center" style="--delay:0s">PROBABILIDADE</text>
    <text x="750" y="155" class="u-title a-text u-center" style="--delay:0s">CONDICIONAL</text>
  </g>

  <!-- ===== CONECTORES (traçado animado) ===== -->
  <g class="u-stroke" stroke-width="3">
    <line x1="750" y1="170" x2="750" y2="235" class="a-draw" style="--delay:0s"/>
    <line x1="120" y1="235" x2="1380" y2="235" class="a-draw" style="--delay:.10s"/>
    <line x1="300"  y1="235" x2="300"  y2="290" class="a-draw" style="--delay:.20s"/>
    <line x1="750"  y1="235" x2="750"  y2="290" class="a-draw" style="--delay:.26s"/>
    <line x1="1200" y1="235" x2="1200" y2="290" class="a-draw" style="--delay:.32s"/>
  </g>

  <!-- =========================================================
       PAINEL 1: ANTES DA INFORMAÇÃO (Ω com A e B)
       ========================================================= -->
  <g>
    <rect x="120" y="290" width="360" height="400" class="u-panel u-stroke"/>
    <text x="300" y="340" class="u-label">1) ANTES</text>
    <text x="300" y="372" class="u-mini u-muted u-center">evento A em Ω, sem condicionar</text>

    <g transform="translate(120,0)" class="baseState">
      <g transform="translate(0,0)"/>
      <g transform="translate(120,395)">
        <use href="#omegaBox"/>
        <g transform="translate(0,0)">
          <use href="#setsAB"/>
        </g>
      </g>

      <text x="300" y="650" class="u-mini u-center u-muted">
        referência: P(A) mede A em relação a Ω
      </text>
    </g>
  </g>

  <!-- =========================================================
       PAINEL 2: DADO QUE B OCORREU (restringe universo)
       ========================================================= -->
  <g>
    <rect x="570" y="290" width="360" height="400" class="u-panel u-stroke"/>
    <text x="750" y="340" class="u-label">2) DADO B</text>
    <text x="750" y="372" class="u-mini u-muted u-center">o “universo” passa a ser B</text>

    <g class="condState">
      <g transform="translate(570,395)">
        <use href="#omegaBox"/>
        <use href="#setsAB"/>

        <!-- escurece fora de B: um “véu” sobre Ω, e “abre” uma janela em B usando clipPath simples -->
        <!-- Implementação: desenha véu em tudo e redesenha B por cima mais forte -->
        <rect x="0" y="0" width="360" height="280" rx="16" ry="16" class="dimOutside"/>

        <!-- redesenha B por cima (para parecer “ativo”) -->
        <ellipse cx="215" cy="150" rx="120" ry="92" fill="rgba(17,24,39,.30)" stroke="#111827" stroke-width="2.4"/>
        <text x="252" y="110" class="u-mini">B</text>

        <!-- seta/legenda “Ω → B” -->
        <line x1="70" y1="248" x2="290" y2="248" class="u-stroke" stroke-width="2.2" marker-end="url(#arrow)" opacity=".8"/>
        <text x="180" y="270" class="u-micro u-center u-muted">restringir ao evento B</text>
      </g>

      <text x="750" y="650" class="u-mini u-center u-muted">
        agora o denominador é B (não Ω)
      </text>
    </g>
  </g>

  <!-- =========================================================
       PAINEL 3: INTERSEÇÃO E FÓRMULA (A∩B dentro de B)
       ========================================================= -->
  <g>
    <rect x="1020" y="290" width="360" height="400" class="u-panel u-stroke"/>
    <text x="1200" y="340" class="u-label">3) DENTRO DE B</text>
    <text x="1200" y="372" class="u-mini u-muted u-center">qual parte também é A?</text>

    <g class="interState">
      <!-- diagrama -->
      <g transform="translate(1020,395)">
        <use href="#omegaBox"/>

        <!-- Deixa B como base do “novo universo” -->
        <ellipse cx="215" cy="150" rx="120" ry="92" fill="rgba(17,24,39,.22)" stroke="#111827" stroke-width="2.2"/>
        <text x="252" y="110" class="u-mini">B</text>

        <!-- Interseção destacada -->
        <use href="#interLens"/>
        <text x="182" y="160" class="u-micro u-center" style="font-weight:700;">A∩B</text>

        <!-- contorno de A “fantasma” só para referência -->
        <ellipse cx="145" cy="150" rx="120" ry="92" fill="rgba(17,24,39,.08)" stroke="#111827" stroke-width="2.0" opacity=".55"/>
        <text x="105" y="110" class="u-mini" opacity=".65">A</text>
      </g>

      <!-- fórmula -->
      <g class="formulaState">
        <text x="1200" y="610" class="u-mini u-center" style="font-weight:700;">
          P(A | B) = P(A ∩ B) / P(B)
        </text>

        <!-- setas: numerador → lente ; denominador → B -->
        <g class="u-stroke" stroke-width="2.2" opacity=".85">
          <!-- numerador (texto à esquerda) -->
          <text x="1065" y="640" class="u-micro u-muted">numerador</text>
          <line x1="1095" y1="632" x2="1146" y2="560" marker-end="url(#arrow)"/>
          <!-- denominador (texto à direita) -->
          <text x="1310" y="640" class="u-micro u-muted">denominador</text>
          <line x1="1330" y1="632" x2="1270" y2="540" marker-end="url(#arrow)"/>
        </g>
      </g>
    </g>
  </g>
</svg>
