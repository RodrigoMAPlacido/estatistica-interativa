<svg viewBox="0 0 1280 620"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc"
     preserveAspectRatio="xMidYMid meet">

  <title id="title">Distribuição normal padrão</title>
  <desc id="desc">
    Animação da distribuição normal padrão destacando a forma simétrica da densidade,
    a esperança E(Z)=0 e a faixa correspondente a um desvio padrão em torno da média.
  </desc>

  <defs>
    <style>
      :root{
        --bg:#ffffff;
        --ink:#111827;
        --ink-soft:#6b7280;
        --grid:#d1d5db;
        --shade:rgba(17,24,39,.06);
        --shade-soft:rgba(17,24,39,.10);
        --font:"et-book","ETBook","Georgia","Times New Roman",serif;
        --cycle:10.8s;
        --ease:ease-in-out;
      }

      svg{
        background:var(--bg);
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
      }

      .u-stroke{
        stroke:var(--ink);
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:none;
      }

      .panel{
        stroke-width:2;
        rx:20;
        ry:20;
      }

      .axis{
        stroke-width:2.2;
        vector-effect:non-scaling-stroke;
      }

      .grid line{
        stroke:var(--grid);
        stroke-width:1;
        vector-effect:non-scaling-stroke;
      }

      .label{
        font-size:54px;
        font-weight:600;
        text-anchor:middle;
      }

      .small{
        font-size:24px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .xlab{
        font-size:22px;
        text-anchor:middle;
      }

      .ylab{
        font-size:22px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .densityArea{
        fill:var(--shade-soft);
        stroke:none;
        opacity:0;
        animation:showArea var(--cycle) var(--ease) infinite;
      }

      .densityCurve{
        stroke:var(--ink);
        stroke-width:2.2;
        fill:none;
        vector-effect:non-scaling-stroke;
        stroke-dasharray:900;
        stroke-dashoffset:900;
        animation:drawCurve var(--cycle) var(--ease) infinite;
      }

      .densityText{
        font-size:19px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:showDensityText var(--cycle) var(--ease) infinite;
      }

      .meanLine{
        stroke:var(--ink);
        stroke-width:1.2;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showMeanLine var(--cycle) var(--ease) infinite;
      }

      .meanText{
        font-size:24px;
        text-anchor:middle;
        opacity:0;
        animation:showMeanText var(--cycle) var(--ease) infinite;
      }

      .sigmaBand{
        fill:var(--shade-soft);
        opacity:0;
        animation:showSigmaBand var(--cycle) var(--ease) infinite;
      }

      .sigmaEdge{
        stroke:var(--ink);
        stroke-width:1.7;
        stroke-dasharray:6 6;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showSigmaEdge var(--cycle) var(--ease) infinite;
      }

      .sigmaArrow{
        stroke:var(--ink);
        stroke-width:1.8;
        fill:none;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showSigmaArrow var(--cycle) var(--ease) infinite;
      }

      .sigmaText{
        font-size:22px;
        text-anchor:middle;
        opacity:0;
        animation:showSigmaText var(--cycle) var(--ease) infinite;
      }

      @keyframes drawCurve{
        0%,14%{
          stroke-dashoffset:900;
          opacity:0;
        }
        26%,88%{
          stroke-dashoffset:0;
          opacity:1;
        }
        100%{
          stroke-dashoffset:900;
          opacity:0;
        }
      }

      @keyframes showArea{
        0%,18%{
          opacity:0;
        }
        30%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showDensityText{
        0%,28%{
          opacity:0;
        }
        38%,56%{
          opacity:1;
        }
        64%,100%{
          opacity:0;
        }
      }

      @keyframes showMeanLine{
        0%,52%{
          opacity:0;
        }
        62%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showMeanText{
        0%,56%{
          opacity:0;
        }
        66%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaBand{
        0%,58%{
          opacity:0;
        }
        68%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaEdge{
        0%,60%{
          opacity:0;
        }
        70%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaArrow{
        0%,64%{
          opacity:0;
        }
        74%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaText{
        0%,68%{
          opacity:0;
        }
        78%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @media (prefers-reduced-motion:reduce){
        .densityArea,.densityCurve,.densityText,.meanLine,.meanText,
        .sigmaBand,.sigmaEdge,.sigmaArrow,.sigmaText{
          animation:none;
          opacity:1;
          transform:none;
          stroke-dashoffset:0;
        }
      }
    </style>
  </defs>

  <g transform="translate(60,35)">
    <rect x="0" y="0" width="1160" height="550" class="u-stroke panel"/>

    <text x="580" y="52" class="label">Distribuição normal padrão</text>
    <text x="580" y="86" class="small">densidade simétrica com média 0 e desvio padrão 1</text>

    <g transform="translate(120,100) scale(1.16,1.16)">
      <!-- grade -->
      <g class="grid">
        <line x1="40" y1="280" x2="700" y2="280"/>
        <line x1="40" y1="225" x2="700" y2="225"/>
        <line x1="40" y1="170" x2="700" y2="170"/>
        <line x1="40" y1="115" x2="700" y2="115"/>
        <line x1="40" y1="60"  x2="700" y2="60"/>
      </g>

      <!-- eixos -->
      <g class="u-stroke axis">
        <line x1="40" y1="280" x2="700" y2="280"/>
        <line x1="40" y1="280" x2="40" y2="60"/>
      </g>

      <text x="-86" y="280" transform="rotate(-90 -86 170)" class="ylab">f(z)</text>
      <text x="370" y="350" class="ylab">valores possíveis de Z</text>

      <!-- faixa E(Z) ± σ = [-1, 1] -->
      <rect x="260" y="60" width="220" height="220" class="sigmaBand"/>
      <line x1="260" y1="60" x2="260" y2="280" class="sigmaEdge"/>
      <line x1="480" y1="60" x2="480" y2="280" class="sigmaEdge"/>

      <!-- área sob a curva -->
      <g transform="translate(-42.5,97.6) scale(2.75,1.52)">
        <path d="M30,120 C95,120 125,20 150,20 C175,20 205,120 270,120 L270,120 L30,120 Z"
              class="densityArea"/>
      </g>

      <!-- curva de sino -->
      <g transform="translate(-42.5,97.6) scale(2.75,1.52)">
        <path d="M30,120 C95,120 125,20 150,20 C175,20 205,120 270,120"
              class="densityCurve"/>
      </g>

      <text x="370" y="112" class="densityText">μ = 0, σ = 1</text>

      <!-- média -->
      <line x1="370" y1="40" x2="370" y2="280" class="meanLine"/>
      <text x="370" y="30" class="meanText">E(Z)</text>

      <!-- seta sigma -->
      <g transform="translate(0,-20)">
        <line x1="370" y1="78" x2="480" y2="78" class="sigmaArrow"/>
        <polyline points="472,73 480,78 472,83" class="sigmaArrow"/>
      </g>
      <text x="425" y="80" class="sigmaText">+σ = +1</text>

      <g transform="translate(0,-20) rotate(180 370 78)">
        <line x1="370" y1="78" x2="480" y2="78" class="sigmaArrow"/>
        <polyline points="472,73 480,78 472,83" class="sigmaArrow"/>
      </g>
      <text x="315" y="80" class="sigmaText">-σ = -1</text>

      <!-- eixo x -->
      <text x="40"  y="312" class="xlab">-3</text>
      <text x="150" y="312" class="xlab">-2</text>
      <text x="260" y="312" class="xlab">-1</text>
      <text x="370" y="312" class="xlab">0</text>
      <text x="480" y="312" class="xlab">1</text>
      <text x="590" y="312" class="xlab">2</text>
      <text x="700" y="312" class="xlab">3</text>
    </g>
  </g>
</svg>