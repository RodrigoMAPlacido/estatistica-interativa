<svg viewBox="0 0 1280 620"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc"
     preserveAspectRatio="xMidYMid meet">

  <title id="title">Distribuição binomial negativa</title>
  <desc id="desc">
    Animação da distribuição binomial negativa destacando a forma da distribuição,
    a esperança E(X) e a faixa correspondente a E(X) mais ou menos sigma.
  </desc>

  <defs>
    <style>
      :root{
        --bg:#ffffff;
        --ink:#111827;
        --ink-soft:#6b7280;
        --grid:#d1d5db;
        --shade:rgba(17,24,39,.06);
        --shade-soft:rgba(17,24,39,.10);
        --font:"et-book","ETBook","Georgia","Times New Roman",serif;
        --cycle:10.8s;
        --ease:ease-in-out;
      }

      svg{
        background:var(--bg);
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
      }

      .u-stroke{
        stroke:var(--ink);
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:none;
      }

      .panel{
        stroke-width:2;
        rx:20;
        ry:20;
      }

      .axis{
        stroke-width:2.2;
        vector-effect:non-scaling-stroke;
      }

      .grid line{
        stroke:var(--grid);
        stroke-width:1;
        vector-effect:non-scaling-stroke;
      }

      .label{
        font-size:54px;
        font-weight:600;
        text-anchor:middle;
      }

      .small{
        font-size:24px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .xlab{
        font-size:22px;
        text-anchor:middle;
      }

      .ylab{
        font-size:22px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .bar{
        fill:var(--ink);
        transform-box:fill-box;
        transform-origin:bottom;
        animation:growBar var(--cycle) var(--ease) infinite;
      }

      .probText{
        font-size:19px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:showProbText var(--cycle) var(--ease) infinite;
      }

      .meanLine{
        stroke:var(--ink);
        stroke-width:1.2;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showMeanLine var(--cycle) var(--ease) infinite;
      }

      .meanText{
        font-size:24px;
        text-anchor:middle;
        opacity:0;
        animation:showMeanText var(--cycle) var(--ease) infinite;
      }

      .sigmaBand{
        fill:var(--shade-soft);
        opacity:0;
        animation:showSigmaBand var(--cycle) var(--ease) infinite;
      }

      .sigmaEdge{
        stroke:var(--ink);
        stroke-width:1.7;
        stroke-dasharray:6 6;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showSigmaEdge var(--cycle) var(--ease) infinite;
      }

      .sigmaArrow{
        stroke:var(--ink);
        stroke-width:1.8;
        fill:none;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showSigmaArrow var(--cycle) var(--ease) infinite;
      }

      .sigmaText{
        font-size:22px;
        text-anchor:middle;
        opacity:0;
        animation:showSigmaText var(--cycle) var(--ease) infinite;
      }

      @keyframes growBar{
        0%,14%{
          transform:scaleY(0);
          opacity:0;
        }
        26%,88%{
          transform:scaleY(1);
          opacity:1;
        }
        100%{
          transform:scaleY(0);
          opacity:0;
        }
      }

      @keyframes showProbText{
        0%,28%{
          opacity:0;
        }
        38%,56%{
          opacity:1;
        }
        64%,100%{
          opacity:0;
        }
      }

      @keyframes showMeanLine{
        0%,52%{
          opacity:0;
        }
        62%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showMeanText{
        0%,56%{
          opacity:0;
        }
        66%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaBand{
        0%,58%{
          opacity:0;
        }
        68%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaEdge{
        0%,60%{
          opacity:0;
        }
        70%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaArrow{
        0%,64%{
          opacity:0;
        }
        74%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaText{
        0%,68%{
          opacity:0;
        }
        78%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @media (prefers-reduced-motion:reduce){
        .bar,.probText,.meanLine,.meanText,.sigmaBand,.sigmaEdge,
        .sigmaArrow,.sigmaText{
          animation:none;
          opacity:1;
          transform:none;
        }
      }
    </style>
  </defs>

  <g transform="translate(60,35)">
    <rect x="0" y="0" width="1160" height="550" class="u-stroke panel"/>

    <text x="580" y="52" class="label">Distribuição binomial negativa</text>
    <text x="580" y="86" class="small">forma da distribuição e dispersão em torno de E(X)</text>

    <g transform="translate(120,100) scale(1.16,1.16)">
      <!-- grade -->
      <g class="grid">
        <line x1="0" y1="280" x2="760" y2="280"/>
        <line x1="0" y1="225" x2="760" y2="225"/>
        <line x1="0" y1="170" x2="760" y2="170"/>
        <line x1="0" y1="115" x2="760" y2="115"/>
        <line x1="0" y1="60"  x2="760" y2="60"/>
      </g>

      <!-- eixos -->
      <g class="u-stroke axis">
        <line x1="0" y1="280" x2="760" y2="280"/>
        <line x1="0" y1="280" x2="0" y2="60"/>
      </g>

      <text x="-86" y="200" transform="rotate(-90 -86 170)" class="ylab">p(x)</text>
      <text x="380" y="350" class="ylab">valores possíveis de X</text>


      <!-- barras -->
      <!-- distribuição para r = 3, p = 0,5 -->
      <rect x="20"  y="185" width="70" height="95"  class="bar" style="animation-delay:0s"/>
      <rect x="110" y="137" width="70" height="143" class="bar" style="animation-delay:.08s"/>
      <rect x="200" y="137" width="70" height="143" class="bar" style="animation-delay:.16s"/>
      <rect x="290" y="161" width="70" height="119" class="bar" style="animation-delay:.24s"/>
      <rect x="380" y="191" width="70" height="89"  class="bar" style="animation-delay:.32s"/>
      <rect x="470" y="218" width="70" height="62"  class="bar" style="animation-delay:.40s"/>
      <rect x="560" y="238" width="70" height="42"  class="bar" style="animation-delay:.48s"/>
      <rect x="650" y="253" width="70" height="27"  class="bar" style="animation-delay:.56s"/>

<!-- faixa E(X) ± σ -->
<rect x="104.55" y="60" width="440.90" height="220" class="sigmaBand"/>
<line x1="104.55" y1="60" x2="104.55" y2="280" class="sigmaEdge"/>
<line x1="545.45" y1="60" x2="545.45" y2="280" class="sigmaEdge"/>

<!-- média -->
<line x1="325" y1="40" x2="325" y2="280" class="meanLine"/>
<text x="325" y="30" class="meanText">E(X)</text>

<!-- seta +σ -->
<g transform="translate(0,-20)">
  <line x1="325" y1="78" x2="545.45" y2="78" class="sigmaArrow"/>
  <polyline points="537.45,73 545.45,78 537.45,83" class="sigmaArrow"/>
</g>
<text x="435.2" y="80" class="sigmaText">+σ</text>

<!-- seta -σ -->
<g transform="translate(0,-20) rotate(180 325 78)">
  <line x1="325" y1="78" x2="545.45" y2="78" class="sigmaArrow"/>
  <polyline points="537.45,73 545.45,78 537.45,83" class="sigmaArrow"/>
</g>
<text x="214.8" y="80" class="sigmaText">-σ</text>
      <!-- rótulos de probabilidade -->
      <text x="55"  y="173" class="probText">0,125</text>
      <text x="145" y="125" class="probText">0,188</text>
      <text x="235" y="125" class="probText">0,188</text>
      <text x="325" y="149" class="probText">0,156</text>
      <text x="415" y="179" class="probText">0,117</text>
      <text x="505" y="206" class="probText">0,082</text>
      <text x="595" y="226" class="probText">0,055</text>
      <text x="685" y="241" class="probText">0,035</text>

      <!-- eixo x -->
      <text x="55"  y="312" class="xlab">3</text>
      <text x="145" y="312" class="xlab">4</text>
      <text x="235" y="312" class="xlab">5</text>
      <text x="325" y="312" class="xlab">6</text>
      <text x="415" y="312" class="xlab">7</text>
      <text x="505" y="312" class="xlab">8</text>
      <text x="595" y="312" class="xlab">9</text>
      <text x="685" y="312" class="xlab">10</text>
    </g>
  </g>
</svg>