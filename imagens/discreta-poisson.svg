<svg viewBox="0 0 1280 620"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc"
     preserveAspectRatio="xMidYMid meet">

  <title id="title">Distribuição de Poisson</title>
  <desc id="desc">
    Animação da distribuição de Poisson destacando a forma da distribuição,
    a esperança E(X) e a faixa correspondente a E(X) mais ou menos sigma.
  </desc>

  <defs>
    <style>
      :root{
        --bg:#ffffff;
        --ink:#111827;
        --ink-soft:#6b7280;
        --grid:#d1d5db;
        --shade:rgba(17,24,39,.06);
        --shade-soft:rgba(17,24,39,.10);
        --font:"et-book","ETBook","Georgia","Times New Roman",serif;
        --cycle:10.8s;
        --ease:ease-in-out;
      }

      svg{
        background:var(--bg);
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
      }

      .u-stroke{
        stroke:var(--ink);
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
        vector-effect:none;
      }

      .panel{
        stroke-width:2;
        rx:20;
        ry:20;
      }

      .axis{
        stroke-width:2.2;
        vector-effect:non-scaling-stroke;
      }

      .grid line{
        stroke:var(--grid);
        stroke-width:1;
        vector-effect:non-scaling-stroke;
      }

      .label{
        font-size:54px;
        font-weight:600;
        text-anchor:middle;
      }

      .small{
        font-size:24px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .xlab{
        font-size:22px;
        text-anchor:middle;
      }

      .ylab{
        font-size:22px;
        text-anchor:middle;
        fill:var(--ink-soft);
      }

      .bar{
        fill:var(--ink);
        transform-box:fill-box;
        transform-origin:bottom;
        animation:growBar var(--cycle) var(--ease) infinite;
      }

      .probText{
        font-size:19px;
        text-anchor:middle;
        fill:var(--ink-soft);
        opacity:0;
        animation:showProbText var(--cycle) var(--ease) infinite;
      }

      .meanLine{
        stroke:var(--ink);
        stroke-width:1.2;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showMeanLine var(--cycle) var(--ease) infinite;
      }

      .meanText{
        font-size:24px;
        text-anchor:middle;
        opacity:0;
        animation:showMeanText var(--cycle) var(--ease) infinite;
      }

      .sigmaBand{
        fill:var(--shade-soft);
        opacity:0;
        animation:showSigmaBand var(--cycle) var(--ease) infinite;
      }

      .sigmaEdge{
        stroke:var(--ink);
        stroke-width:1.7;
        stroke-dasharray:6 6;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showSigmaEdge var(--cycle) var(--ease) infinite;
      }

      .sigmaArrow{
        stroke:var(--ink);
        stroke-width:1.8;
        fill:none;
        opacity:0;
        vector-effect:non-scaling-stroke;
        animation:showSigmaArrow var(--cycle) var(--ease) infinite;
      }

      .sigmaText{
        font-size:22px;
        text-anchor:middle;
        opacity:0;
        animation:showSigmaText var(--cycle) var(--ease) infinite;
      }

      @keyframes growBar{
        0%,14%{
          transform:scaleY(0);
          opacity:0;
        }
        26%,88%{
          transform:scaleY(1);
          opacity:1;
        }
        100%{
          transform:scaleY(0);
          opacity:0;
        }
      }

      @keyframes showProbText{
        0%,28%{
          opacity:0;
        }
        38%,56%{
          opacity:1;
        }
        64%,100%{
          opacity:0;
        }
      }

      @keyframes showMeanLine{
        0%,52%{
          opacity:0;
        }
        62%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showMeanText{
        0%,56%{
          opacity:0;
        }
        66%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaBand{
        0%,58%{
          opacity:0;
        }
        68%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaEdge{
        0%,60%{
          opacity:0;
        }
        70%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaArrow{
        0%,64%{
          opacity:0;
        }
        74%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @keyframes showSigmaText{
        0%,68%{
          opacity:0;
        }
        78%,88%{
          opacity:1;
        }
        100%{
          opacity:0;
        }
      }

      @media (prefers-reduced-motion:reduce){
        .bar,.probText,.meanLine,.meanText,.sigmaBand,.sigmaEdge,
        .sigmaArrow,.sigmaText{
          animation:none;
          opacity:1;
          transform:none;
        }
      }
    </style>
  </defs>

  <g transform="translate(60,35)">
    <rect x="0" y="0" width="1160" height="550" class="u-stroke panel"/>

    <text x="580" y="52" class="label">Distribuição de Poisson</text>
    <text x="580" y="86" class="small">forma da distribuição e dispersão em torno de E(X)</text>

    <g transform="translate(120,100) scale(1.16,1.16)">
      <!-- grade -->
      <g class="grid">
        <line x1="0" y1="280" x2="780" y2="280"/>
        <line x1="0" y1="225" x2="780" y2="225"/>
        <line x1="0" y1="170" x2="780" y2="170"/>
        <line x1="0" y1="115" x2="780" y2="115"/>
        <line x1="0" y1="60"  x2="780" y2="60"/>
      </g>

      <!-- eixos -->
      <g class="u-stroke axis">
        <line x1="0" y1="280" x2="780" y2="280"/>
        <line x1="0" y1="280" x2="0" y2="60"/>
      </g>

      <text x="-86" y="200" transform="rotate(-90 -86 170)" class="ylab">p(x)</text>
      <text x="390" y="350" class="ylab">valores possíveis de X</text>

      <!-- faixa E(X) ± σ -->
      <!-- λ = 3 -->
      <!-- E(X) = 3 ; σ = √3 ≈ 1,732 -->
      <!-- centros: 60, 155, 250, 345, 440, 535, 630, 725 ; passo = 95 -->
      <!-- média em x = 345 -->
      <!-- deslocamento σ = 1,732 * 95 ≈ 164,54 -->
      <rect x="180.46" y="60" width="329.08" height="220" class="sigmaBand"/>
      <line x1="180.46" y1="60" x2="180.46" y2="280" class="sigmaEdge"/>
      <line x1="509.54" y1="60" x2="509.54" y2="280" class="sigmaEdge"/>

      <!-- barras -->
      <!-- probabilidades:
           0: 0,050
           1: 0,149
           2: 0,224
           3: 0,224
           4: 0,168
           5: 0,101
           6: 0,050
           7: 0,022
      -->
      <rect x="30"  y="245" width="60" height="35"  class="bar" style="animation-delay:0s"/>
      <rect x="125" y="175" width="60" height="105" class="bar" style="animation-delay:.08s"/>
      <rect x="220" y="122" width="60" height="158" class="bar" style="animation-delay:.16s"/>
      <rect x="315" y="122" width="60" height="158" class="bar" style="animation-delay:.24s"/>
      <rect x="410" y="162" width="60" height="118" class="bar" style="animation-delay:.32s"/>
      <rect x="505" y="209" width="60" height="71"  class="bar" style="animation-delay:.40s"/>
      <rect x="600" y="245" width="60" height="35"  class="bar" style="animation-delay:.48s"/>
      <rect x="695" y="265" width="60" height="15"  class="bar" style="animation-delay:.56s"/>

      <!-- média -->
      <line x1="345" y1="40" x2="345" y2="280" class="meanLine"/>
      <text x="345" y="30" class="meanText">E(X)</text>

      <!-- seta sigma -->
      <g transform="translate(0,-20)">
        <line x1="345" y1="78" x2="509.54" y2="78" class="sigmaArrow"/>
        <polyline points="501.54,73 509.54,78 501.54,83" class="sigmaArrow"/>
      </g>
      <text x="427.27" y="80" class="sigmaText">+σ</text>

      <g transform="translate(0,-20) rotate(180 345 78)">
        <line x1="345" y1="78" x2="509.54" y2="78" class="sigmaArrow"/>
        <polyline points="501.54,73 509.54,78 501.54,83" class="sigmaArrow"/>
      </g>
      <text x="262.73" y="80" class="sigmaText">-σ</text>

      <!-- rótulos de probabilidade -->
      <text x="60"  y="233" class="probText">0,050</text>
      <text x="155" y="163" class="probText">0,149</text>
      <text x="250" y="110" class="probText">0,224</text>
      <text x="345" y="110" class="probText">0,224</text>
      <text x="440" y="150" class="probText">0,168</text>
      <text x="535" y="197" class="probText">0,101</text>
      <text x="630" y="233" class="probText">0,050</text>
      <text x="725" y="253" class="probText">0,022</text>

      <!-- eixo x -->
      <text x="60"  y="312" class="xlab">0</text>
      <text x="155" y="312" class="xlab">1</text>
      <text x="250" y="312" class="xlab">2</text>
      <text x="345" y="312" class="xlab">3</text>
      <text x="440" y="312" class="xlab">4</text>
      <text x="535" y="312" class="xlab">5</text>
      <text x="630" y="312" class="xlab">6</text>
      <text x="725" y="312" class="xlab">7</text>
    </g>
  </g>
</svg>