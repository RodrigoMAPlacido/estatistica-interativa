<?xml version="1.0" encoding="UTF-8"?>
<!-- ===========================================
  AMOSTRAGEM — scanner em “percurso retangular”
  Pedido: scanner vai para direita → desce → volta para esquerda → sobe
  (somente animação do scanner; texto e quadros estáticos)
  =========================================== -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 520 380"
     width="320" height="180"
     role="img"
     aria-labelledby="title desc"
     style="background:transparent">

  <title id="title">Amostragem</title>
  <desc id="desc">
    Um quadro “AMOSTRAGEM” com uma área de pontos. Um retângulo tipo scanner translúcido percorre a área
    em um ciclo: direita, baixo, esquerda e cima, representando a coleta.
  </desc>

  <defs>
    <style>
      :root{
        --ink:#111827;
        --muted:#6b7280;

        --stroke:2.4;
        --thin:1.6;

        --font:"et-book","ETBook","Georgia",serif;

        /* área interna real */
        --innerX:95;
        --innerY:135;
        --innerW:330;
        --innerH:190;

        /* scanner */
        --scanW:140;
        --scanH:120;

        /* deslocamentos máximos dentro da área (inner - scan) */
        --scanDx:190px; /* 330 - 140 */
        --scanDy:70px;  /* 190 - 120 */

        /* timing (blocos com pequenas pausas nas “quinas”) */
        --T:7.0s;
        --ease:ease-in-out;
      }

      text{
        font-family:var(--font);
        fill:var(--ink);
        user-select:none;
        letter-spacing:.13px;
      }
      .u-center{ text-anchor:middle; }
      .u-bold{ font-weight:700; }

      .h{ font-size:34px; }
      .sub{ font-size:18px; fill:var(--muted); }

      .u-stroke{
        fill:none;
        stroke:var(--ink);
        stroke-width:var(--stroke);
        stroke-linecap:round;
        stroke-linejoin:round;
      }
      .u-thin{
        fill:none;
        stroke:var(--ink);
        stroke-width:var(--thin);
        stroke-linecap:round;
        stroke-linejoin:round;
      }

      /* Pontos */
      .dot{ fill:var(--ink); }
      .t1{ fill-opacity:.30; }
      .t2{ fill-opacity:.50; }
      .t3{ fill-opacity:.70; }
      .t4{ fill-opacity:1; }

      /* ====== Scanner ====== */
      .scanFill{ fill:rgba(31,41,55,0.08); }
      .scanStroke{
        fill:none;
        stroke:rgba(17,24,39,0.85);
        stroke-width:var(--thin);
      }
      .scanLine{
        stroke:rgba(17,24,39,0.85);
        stroke-width:1.3;
        stroke-linecap:round;
        opacity:.55;
      }

      /* Move em 2D: (0,0) → (Dx,0) → (Dx,Dy) → (0,Dy) → (0,0) */
      .a-scanXY{
        animation:k-scanXY var(--T) var(--ease) infinite;
        transform-box: fill-box;
        transform-origin: 0 0;
        will-change: transform, opacity;
      }

      @keyframes k-scanXY{
        /* aparece e “assenta” */
        0%   { transform:translate(0px,0px); opacity:1; }
        8%   { transform:translate(0px,0px); opacity:1; }
        16%  { transform:translate(0px,0px); opacity:1; }

        /* direita */
        34%  { transform:translate(var(--scanDx),0px); opacity:1; }
        42%  { transform:translate(var(--scanDx),0px); opacity:1; } /* pausa na quina */

        /* baixo */
        58%  { transform:translate(var(--scanDx),var(--scanDy)); opacity:1; }
        66%  { transform:translate(var(--scanDx),var(--scanDy)); opacity:1; } /* pausa */

        /* esquerda */
        82%  { transform:translate(0px,var(--scanDy)); opacity:1; }
        90%  { transform:translate(0px,var(--scanDy)); opacity:1; } /* pausa */

        /* cima + some no fim para “respirar” antes do loop */
        100% { transform:translate(0px,0px); opacity:1; }
      }

      @media (prefers-reduced-motion:reduce){
        .a-scanXY{ animation:none !important; opacity:1 !important; transform:translate(0px,0px) !important; }
      }
    </style>

    <clipPath id="clip-inner">
      <rect x="95" y="135" width="330" height="190" rx="12" ry="12"/>
    </clipPath>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>

  <!-- quadro externo -->
  <rect x="50" y="40" width="420" height="300" rx="18" ry="18" class="u-stroke"/>

  <!-- título (estático) -->
  <text x="260" y="92" class="u-center u-bold h">AMOSTRAGEM</text>
  <text x="260" y="118" class="u-center sub">Variabilidade na população</text>

  <!-- área interna -->
  <rect x="95" y="135" width="330" height="190" rx="12" ry="12" class="u-thin"/>

  <!-- pontos -->
  <g aria-hidden="true">
    <circle cx="120" cy="160" r="4" class="dot t2"/><circle cx="155" cy="160" r="6" class="dot t4"/><circle cx="190" cy="160" r="4" class="dot t1"/><circle cx="225" cy="160" r="5" class="dot t3"/><circle cx="260" cy="160" r="4" class="dot t2"/><circle cx="295" cy="160" r="6" class="dot t4"/><circle cx="330" cy="160" r="4" class="dot t2"/><circle cx="365" cy="160" r="5" class="dot t3"/><circle cx="400" cy="160" r="4" class="dot t2"/>
    <circle cx="120" cy="190" r="5" class="dot t3"/><circle cx="155" cy="190" r="4" class="dot t2"/><circle cx="190" cy="190" r="6" class="dot t4"/><circle cx="225" cy="190" r="4" class="dot t1"/><circle cx="260" cy="190" r="5" class="dot t3"/><circle cx="295" cy="190" r="4" class="dot t2"/><circle cx="330" cy="190" r="6" class="dot t4"/><circle cx="365" cy="190" r="4" class="dot t2"/><circle cx="400" cy="190" r="5" class="dot t3"/>
    <circle cx="120" cy="220" r="4" class="dot t1"/><circle cx="155" cy="220" r="6" class="dot t4"/><circle cx="190" cy="220" r="4" class="dot t2"/><circle cx="225" cy="220" r="5" class="dot t3"/><circle cx="260" cy="220" r="6" class="dot t4"/><circle cx="295" cy="220" r="4" class="dot t2"/><circle cx="330" cy="220" r="5" class="dot t3"/><circle cx="365" cy="220" r="4" class="dot t1"/><circle cx="400" cy="220" r="6" class="dot t4"/>
    <circle cx="120" cy="250" r="6" class="dot t4"/><circle cx="155" cy="250" r="4" class="dot t2"/><circle cx="190" cy="250" r="5" class="dot t3"/><circle cx="225" cy="250" r="4" class="dot t1"/><circle cx="260" cy="250" r="5" class="dot t3"/><circle cx="295" cy="250" r="6" class="dot t4"/><circle cx="330" cy="250" r="4" class="dot t2"/><circle cx="365" cy="250" r="5" class="dot t3"/><circle cx="400" cy="250" r="4" class="dot t1"/>
    <circle cx="120" cy="280" r="4" class="dot t2"/><circle cx="155" cy="280" r="5" class="dot t3"/><circle cx="190" cy="280" r="4" class="dot t1"/><circle cx="225" cy="280" r="6" class="dot t4"/><circle cx="260" cy="280" r="4" class="dot t2"/><circle cx="295" cy="280" r="5" class="dot t3"/><circle cx="330" cy="280" r="4" class="dot t1"/><circle cx="365" cy="280" r="6" class="dot t4"/><circle cx="400" cy="280" r="4" class="dot t2"/>
    <circle cx="120" cy="310" r="5" class="dot t3"/><circle cx="155" cy="310" r="4" class="dot t2"/><circle cx="190" cy="310" r="6" class="dot t4"/><circle cx="225" cy="310" r="4" class="dot t1"/><circle cx="260" cy="310" r="5" class="dot t3"/><circle cx="295" cy="310" r="4" class="dot t2"/><circle cx="330" cy="310" r="6" class="dot t4"/><circle cx="365" cy="310" r="4" class="dot t2"/><circle cx="400" cy="310" r="5" class="dot t3"/>
  </g>

  <!-- scanner (clipped) -->
  <g clip-path="url(#clip-inner)">
    <g transform="translate(95 135)">
      <g class="a-scanXY">
        <rect x="0" y="0" width="140" height="120" rx="12" ry="12" class="scanFill"/>
        <rect x="0" y="0" width="140" height="120" rx="12" ry="12" class="scanStroke"/>
      </g>
    </g>
  </g>

</svg>
